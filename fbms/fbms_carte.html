<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FBMS Carte</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>html,body{margin:0;height:100%;font-family:Arial}body{display:flex;flex-direction:column}.top{height:56px;background:#053B23;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 14px}.btn{background:white;color:#053B23;padding:8px 10px;border-radius:8px;text-decoration:none;font-weight:bold}.body{flex:1;display:flex}.side{width:280px;background:#fff;border-right:1px solid #ddd;padding:12px}.map{flex:1}.k{background:#f1f9ef;border:1px solid #ddd;border-radius:8px;padding:9px;margin-bottom:8px}.vlabel{background:white;border:1px solid #bbb;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:bold;box-shadow:0 2px 5px #0002;white-space:nowrap}.clabel{background:#053B23;color:white;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:bold;white-space:nowrap}.leaflet-label-pane{z-index:760!important;pointer-events:none}@media(max-width:800px){.body{display:block}.side{width:100%;height:145px}.map{height:calc(100vh - 201px)}}</style></head><body><div class="top"><div><b>Cartographie FBMS</b><br><small>Villages N'DJEBONOUA</small></div><a class="btn" href="https://nwodobe.github.io/fbms/">Portail</a></div><div class="body"><aside class="side"><div class="k"><b>Villages affiches:</b> <span id="kv">9</span></div><div class="k"><b>Cluster:</b> N'DJEBONOUA</div><button onclick="toggleLabels()">Afficher / masquer noms</button></aside><div id="map" class="map"></div></div><script>var villages=[['Akanzakro',7.62533,-5.10555],['DILA',7.61155,-5.20518],['Lengbre',7.35651,-5.16023],["Mgbrenzue",7.516383,-4.97909],["MLANKOUASSIKRO",7.515687,-4.970703],["NGATTADOLIKRO",7.280889,-5.137615],["NGOME",7.368429,-5.066178],['Tollatanoukro',7.528237,-5.092265],['Toungbokro',7.351838,-5.111127]];var hub=['NDJEBONOUA',7.520164,-5.070205];var usine=['Usine Yamoussoukro',6.741972,-5.345750];var map=L.map('map').setView([7.52,-5.08],10);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'OpenStreetMap'}).addTo(map);map.createPane('labels');map.getPane('labels').className+=' leaflet-label-pane';var layerLabels=L.layerGroup().addTo(map),layerPoints=L.layerGroup().addTo(map),layerLines=L.layerGroup().addTo(map);var show=true;function label(t,lat,lng,c){if(!show)return;var ic=L.divIcon({className:'',html:'<div class="'+c+'">'+t+'</div>',iconSize:null,iconAnchor:[-8,-8]});L.marker([lat,lng],{icon:ic,pane:'labels',interactive:false,zIndexOffset:10000}).addTo(layerLabels)}function draw(){layerLabels.clearLayers();layerPoints.clearLayers();layerLines.clearLayers();L.circleMarker([hub[1],hub[2]],{radius:14,color:'#fff',weight:3,fillColor:'#053B23',fillOpacity:.95}).addTo(layerPoints).bindPopup('<b>'+hub[0]+'</b>');label(hub[0],hub[1],hub[2],'clabel');L.marker([usine[1],usine[2]]).addTo(layerPoints).bindPopup(usine[0]);L.polyline([[hub[1],hub[2]],[usine[1],usine[2]]],{color:'#EE9E00',weight:3,dashArray:'8 7'}).addTo(layerLines);villages.forEach(function(v){L.circleMarker([v[1],v[2]],{radius:7,color:'#fff',weight:2,fillColor:'#1F5B3F',fillOpacity:.95}).addTo(layerPoints).bindPopup('<b>'+v[0]+'</b><br>Cluster: '+hub[0]);L.polyline([[v[1],v[2]],[hub[1],hub[2]]],{color:'#1d6fa5',weight:2,dashArray:'7 6'}).addTo(layerLines);label(v[0],v[1],v[2],'vlabel')});var b=villages.map(function(v){return[v[1],v[2]]});b.push([hub[1],hub[2]]);map.fitBounds(b,{padding:[35,35],maxZoom:12})}function keep(){map.getPane('labels').style.zIndex=760;layerLabels.eachLayer(function(x){if(x.setZIndexOffset)x.setZIndexOffset(10000)})}function toggleLabels(){show=!show;draw()}['click','zoomend','moveend','popupopen','popupclose'].forEach(function(e){map.on(e,function(){setTimeout(keep,20)})});draw();keep();</script></body></html>
