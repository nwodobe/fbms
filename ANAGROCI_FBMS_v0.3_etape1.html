<script>
/* ============================================================================
   ANAGROCI · FIELD BUYING 2027 — Field Buying Management System (FBMS)
   Version WEB autonome (HTML/CSS/JS vanilla, sans React) — un seul fichier
   ----------------------------------------------------------------------------
   v0.11 — MODULE PRODUCTEURS :
   · Nouvelle vue "Producteurs" : on sélectionne un village, l'application
     charge SES producteurs (jamais toute la base — conçu pour 10 000+
     enregistrements sur réseau terrain).
   · Enrôlement rapide : 7 champs obligatoires (nom, sexe, année, téléphone,
     campement, superficie, production précédente), titulaire du téléphone,
     RT référent et coopérative recommandés, + enrichissement optionnel
     (verger, acheteur habituel, engagement, paiement Mobile Money, pièce).
   · Code producteur définitif (ex : DIABO-047) attribué par le SERVEUR à la
     première synchronisation — pas de doublon possible entre agents hors
     ligne. Statuts : Identifié, Enrôlé, Actif, Inactif.
   · Hors ligne : enrôlement local (store IndexedDB v3), envoi à la synchro ;
     le cache local ne garde que les villages consultés.
   · Compteur "Producteurs" de la Base RT calculé depuis les enrôlements
     réels dès qu'ils existent.
   ----------------------------------------------------------------------------
   v0.10 — CHANTIER B : MODULE RT (Représentants Terrain) :
   · Nouvelle vue "Base RT" : registre consolidé des RT, indépendant des
     fiches villages. Recherche, filtre par statut RT (Pressenti, Confirmé,
     Actif, Écarté), KPIs.
   · Fiche RT : identité, téléphone, village lié, statut, score /100,
     historique d'évènements (contact, visite, formation, incident),
     performance campagne (tonnage engagé/livré, avances), compteur
     producteurs rattachés (prépare le module Producteurs).
   · Import en un clic des candidats RT depuis les fiches villages,
     dédoublonné par téléphone (puis par nom si pas de téléphone).
   · Base RT hors ligne (nouveau store IndexedDB, migration v1→v2 auto)
     et synchronisée vers l'onglet RT de FBMS_DB (backend v1.6).
   ----------------------------------------------------------------------------
   v0.9 — CHANTIER A : STATUTS DE FICHE + VUE DÉCISION BM :
   · Statut sur chaque fiche : Brouillon, Soumis, À corriger, Validé
     Supervisor, Validé Head of Field, Approuvé BM, Rejeté. Circuit souple :
     l'encadrement change librement, l'Agent Recenseur est limité à
     Brouillon/Soumis (verrouillé côté serveur v1.5).
   · Statut visible et filtrable en Base de données, sélecteur dans le
     formulaire, pastille dans la fiche village.
   · Nouvelle vue "Décision BM" : file d'arbitrage (fiches Validé Head of
     Field) classée par score puis potentiel, signaux de risque, actions
     Approuver / Rejeter / À corriger.
   ----------------------------------------------------------------------------
   v0.8 — GESTION DES UTILISATEURS (co-développement) :
   · Administration > Gestion des utilisateurs (Branch Manager connecté
     uniquement, contrôle serveur v1.4) : création de comptes (PIN généré,
     affiché une seule fois), activation/désactivation, changement de rôle,
     réinitialisation de PIN. Chaque action est tracée dans AUDIT_LOG.
   ----------------------------------------------------------------------------
   v0.7 — PWA / MOBILE (co-développement) :
   · Interface adaptée aux téléphones : menu hamburger (barre latérale
     masquée), grilles sur 1-2 colonnes, tableau défilable, fiche village
     plein écran.
   · Manifeste d'installation + service worker (sw.js) : app installable sur
     l'écran d'accueil, librairies et photos en cache pour le hors ligne.
     Actifs uniquement en HTTPS (GitHub Pages) — le fichier local reste
     100% fonctionnel sans ces éléments.
   · Voir GUIDE_DEPLOIEMENT_PWA.md pour l'hébergement.
   ----------------------------------------------------------------------------
   v0.6 — ÉTAPE 4 (co-développement) :
   · Moteur de synchronisation complet : contrôle de conflit optimiste
     (baseUpdatedAt vs serveur), fenêtre d'arbitrage "ma version / version
     serveur", badge rouge sur les fiches en conflit.
   · Barre de progression de synchro (fine barre verte en haut d'écran).
   · Synchronisation automatique toutes les 5 minutes (débrayable dans
     Administration) + reprise automatique au retour du réseau.
   · Visionneuse photo interne (aperçu + téléchargement), compatible photos
     locales (base64) et photos Drive — corrige le blocage navigateur de
     window.open sur les data URLs.
   ----------------------------------------------------------------------------
   v0.5 — ÉTAPE 3 (co-développement) :
   · Photos dans Google Drive : compression côté client (1600 px, JPEG),
     envoi à l'enregistrement de la fiche ou à la synchro, remplacement du
     base64 local par l'URL Drive (visible sur tous les appareils via Sheets).
   · Arborescence Drive créée/réutilisée par le backend v1.2 : FIELD BUYING
     2027 → Région → Département → Village (id) → Photos/Rapports/Documents.
   · Remplacement d'une photo = ancien fichier Drive mis à la corbeille ;
     suppression hors ligne mise en file et rejouée à la synchro.
   · Affichage accepte base64 local (hors ligne) ET URL Drive (http).
   ----------------------------------------------------------------------------
   v0.4 — ÉTAPE 2 (co-développement) :
   · Google Sheets devient la base de données : RemoteVillages (list/upsert/
     remove) appelle le backend v1.1 — 1 village = 1 ligne de l'onglet
     VILLAGES. Écriture "local d'abord" : IndexedDB toujours servi en premier
     (zéro perte hors ligne), puis envoi vers Sheets si connecté.
   · Bouton "Synchroniser" (topbar) : pousse les fiches en attente, applique
     les suppressions différées, tire les fiches des autres appareils,
     répercute les suppressions distantes. Fusion : photos locales conservées
     (Drive à l'Étape 3), travail local non poussé jamais écrasé.
   · Indicateur "En attente de synchronisation" sur les fiches non envoyées.
   · Les fiches de démonstration (v_demo_*) ne sont jamais synchronisées.
   ----------------------------------------------------------------------------
   v0.3 — ÉTAPE 1 (co-développement) :
   · Couche AUTH abstraite (login / logout / session persistée) branchée sur
     le backend Google Apps Script (FBMS_Backend_Code.gs). L'interface AUTH
     est indépendante du fournisseur : remplaçable par Supabase Auth sans
     toucher à l'UI.
   · callBackend() : transport HTTPS vers le Web App Apps Script, corps JSON
     en text/plain (requête "simple" → aucun préflight CORS, fonctionne même
     depuis un fichier ouvert localement).
   · Topbar : bouton "Se connecter" + chip utilisateur (nom, rôle, initiales)
     + déconnexion. Le sélecteur de rôle manuel reste actif tant que
     l'utilisateur n'est pas connecté (mode local historique) ; connecté, le
     rôle vient du serveur (onglet USERS) et n'est plus modifiable.
   · Session conservée dans localStorage, revalidée en arrière-plan au
     démarrage quand le réseau est disponible ; hors ligne, la session locale
     est conservée (usage terrain).
   · Administration : carte "Connexion Cloud" (état backend, test de
     connexion, session en cours).
   ----------------------------------------------------------------------------
   v0.2 — ÉTAPE 0 : CDN restaurés · persistance IndexedDB · base vide +
   données démo à la demande · updatedAt · correction exportCSV (\r\n).
   ----------------------------------------------------------------------------
   Reprend à 100% les champs du FORMULAIRE_VILLAGE.xlsx (9 sections + photos).
   Architecture: DataAdapter abstrait (aujourd'hui IndexedDB, demain Google
   Sheets via Apps Script / Supabase sans changement d'interface).
   ========================================================================== */

    storeName: "villages",

  },
  backend: {
    // URL du Web App Google Apps Script — voir GUIDE_DEPLOIEMENT_ETAPE1.md.

    // Tant que cette URL est vide, l'application fonctionne en mode local.
    appsScriptUrl: "https://script.google.com/macros/s/AKfycbz1n65s_aHyv0yascZrbX4pKvrZagALI62xad7tAJbxK24FULsU37mBf4Q0z3nx3k3c/exec",
  },
  auth: {

/* --------------------------------- TOKENS -------------------------------- */
const T = {

const TIERS = [

/* ------------------------- STATUTS DE FICHE — v0.9 ------------------------ */
const STATUTS = [
  { key:"Brouillon",            color:"#7A8580" },
  { key:"Soumis",               color:"#4B5A52" },
  { key:"À corriger",           color:"#E08E2D" },

function statutPillHTML(s){
  const c = statutColor(s);
  return '<span class="ff-body inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-semibold whitespace-nowrap" style="background-color:'+c+'1A;color:'+c+'">'+s+'</span>';
}
/** Statuts qu'un utilisateur peut poser (circuit souple ; revérifié serveur). */
function statutsAutorises(){
  const role = AUTH.isConnected() ? AUTH.session.role : STATE.role;
  if (role === "Consultation uniquement") return [];
  if (role === "Agent Recenseur") return ["Brouillon","Soumis"];
  return STATUTS.map(s=>s.key);
}

function emptyCandidat(){ return { nom:"", telephone:"", activite:"", instruction:"", smartphone:false, compteBancaire:false, compteWave:false, reputation:"" }; }

function placeholderPhotoDataUri(label, color){
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">'
    + '<rect width="240" height="240" fill="'+color+'"/>'
    + '<text x="50%" y="50%" font-family="sans-serif" font-size="15" fill="#ffffffd9" text-anchor="middle" dominant-baseline="middle">'+label+'</text></svg>';
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

  const prodMoy = rand(180,520);
  const potentiel = Math.round((nbProd*prodMoy)/1000);
  const noteRoute = rand(2,10);
  const nbAcheteurs = rand(0,4);
  const acheteurs = Array.from({length:nbAcheteurs}).map(()=>({ nom: pick(["OLAM","SACO","OUTSPAN","COMPAGNIE COMMERCIALE","NEGOCIANT LOCAL"]), volumeEstime: rand(5,120) }));
  const s9 = {
    potentiel20: Math.min(20, Math.round(potentiel/25) + rand(0,4)),
    route20: Math.round(noteRoute*2) - rand(0,3),
    dispoRT20: rand(6,20),
    risqueConcurrentiel20: Math.max(2, 20 - nbAcheteurs*4 - rand(0,3)),
    faisabilitePaiement20: rand(8,20),
    decision:"",
  };
  const base = blankVillage();
  return {
    ...base,
    id: "v_demo_" + (100+i), // préfixe "demo" : identifie les fiches de démonstration
    s1:{ region:regionObj.region, departement:dep, sousPrefecture:dep+" Centre", cluster:"Cluster "+dep.slice(0,3).toUpperCase()+"-"+rand(1,3),
         village:VILLAGE_NAMES[i % VILLAGE_NAMES.length], dateVisite:"2026-0"+rand(3,6)+"-"+rand(10,28), enqueteur:pick(ENQUETEURS),
         gpsLat:(7.5+Math.random()*3-1.5).toFixed(5), gpsLng:(-6.5+Math.random()*3-1.5).toFixed(5), distanceHub:rand(3,65) },
    s2:{ chef:{ nom:"Chef "+pick(["Koffi","Yao","Silué","Coulibaly","Ouattara"])+" "+pick(["N'Guessan","Diomandé","Bamba"]), telephone:"07"+rand(10000000,99999999), disponible:bool(0.7), influence:pick(["Forte","Moyenne","Faible"]) },
         leader:{ nom: bool(0.6) ? pick(["Adama","Issouf","Marc","Awa"])+" "+pick(["Traoré","Koné","Silué"]) : "", telephone:"05"+rand(10000000,99999999), influence:pick(["Forte","Moyenne","Faible"]) },
         president:{ nom: pick(["Amara","Salif","Georgette"])+" "+pick(["Ouattara","Bamba"]), cooperative:"COOPAGRI-"+dep.slice(0,3).toUpperCase(), telephone:"01"+rand(10000000,99999999), membres:rand(20,250) } },
    s3:{ nbProducteurs:nbProd, prodMoyenneKg:prodMoy, potentielMT:potentiel, potentielSecuriseMT:Math.round(potentiel*(0.3+Math.random()*0.4)), periodeForte:pick(["Février - Avril","Mars - Mai","Avril - Juin"]) },

/* ============================================================================
   DATA ADAPTER — abstraction (aujourd'hui IndexedDB, demain Sheets/Supabase)
   Interface commune : { init?, list, upsert, remove, clear? }
   ========================================================================== */
class InMemoryAdapter{
  constructor(seed){ this.rows = seed || []; }
  async list(){ return [...this.rows]; }
  async upsert(record){ const i=this.rows.findIndex(r=>r.id===record.id); if(i>=0) this.rows[i]=record; else this.rows.push(record); return record; }
  async remove(id){ this.rows = this.rows.filter(r=>r.id!==id); }
  async clear(){ this.rows = []; }
}

/**
 * IndexedDBAdapter (Étape 0) — persistance locale durable sur l'appareil.
 * Même interface que InMemoryAdapter : l'UI ne connaît pas le stockage.
 * IndexedDB est choisi plutôt que localStorage car les photos en base64
 * dépassent rapidement le quota localStorage (~5 Mo) ; IndexedDB supporte
 * des volumes bien supérieurs et des objets structurés natifs.
 */
class IndexedDBAdapter{
  /** storeName optionnel : permet plusieurs adapters (villages, rt) sur la même base. */
  constructor(cfg, storeName){
    this.dbName = cfg.dbName; this.dbVersion = cfg.dbVersion;
    this.storeName = storeName || cfg.storeName;
    this.storeNames = cfg.storeNames || [this.storeName];
    this.db = null;
  }
  /** Ouvre (et crée si besoin) la base et TOUS les stores déclarés. Idempotent. */
  async init(){
    if (this.db) return this;
    this.db = await new Promise((resolve, reject)=>{
      const req = indexedDB.open(this.dbName, this.dbVersion);
      req.onupgradeneeded = ()=>{
        const db = req.result;
        // v0.10 : crée tous les stores manquants (migration v1→v2 sans perte).
        for (const name of this.storeNames){
          if (!db.objectStoreNames.contains(name)) db.createObjectStore(name, { keyPath:"id" });
        }
      };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    });
    return this;
  }
  /** Raccourci transaction → object store. */
  _store(mode){ return this.db.transaction(this.storeName, mode).objectStore(this.storeName); }
  /** Promisifie une requête IndexedDB. */
  _req(request){ return new Promise((res, rej)=>{ request.onsuccess = ()=>res(request.result); request.onerror = ()=>rej(request.error); }); }
  /** Retourne toutes les fiches villages. */
  async list(){ await this.init(); return (await this._req(this._store("readonly").getAll())) || []; }
  /** Crée ou met à jour une fiche (clé = id). */
  async upsert(record){ await this.init(); await this._req(this._store("readwrite").put(record)); return record; }
  /** Supprime une fiche par id. */
  async remove(id){ await this.init(); await this._req(this._store("readwrite").delete(id)); }
  /** Vide entièrement le store local (utilisé par l'Administration). */
  async clear(){ await this.init(); await this._req(this._store("readwrite").clear()); }
}

// si l'ouverture de la base échoue à l'exécution.

/* ============================================================================
   BACKEND / AUTH — Étape 1
   Transport vers le Web App Google Apps Script + service d'authentification.
   L'objet AUTH expose une interface indépendante du fournisseur
   (restore / login / logout / validate / isConnected) : le jour où Supabase
   Auth remplace Apps Script, seul l'intérieur de ces méthodes change.
   ========================================================================== */

/**
 * Appelle le backend Apps Script : callBackend("login", {email, pin}).
 * Corps JSON envoyé en text/plain : requête HTTP "simple", donc aucun
 * préflight CORS — fonctionne depuis n'importe quelle origine, y compris
 * un fichier HTML ouvert localement (origine "null").
 */
async function callBackend(action, payload){
  if (!APP_CONFIG.backend.appsScriptUrl) throw new Error("Backend non configuré : renseignez APP_CONFIG.backend.appsScriptUrl (voir guide de déploiement).");
  let resp;
  try{
    resp = await fetch(APP_CONFIG.backend.appsScriptUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      // Étape 2 : le jeton de session est injecté automatiquement
      // (surchargé si le payload en fournit un explicitement : logout/session).
      body: JSON.stringify(Object.assign({ action: action, token: (typeof AUTH !== "undefined" && AUTH.session) ? AUTH.session.token : undefined }, payload || {})),
    });
  } catch(e){
    throw new Error("Réseau indisponible ou URL backend invalide.");
  }
  if (!resp.ok) throw new Error("Erreur HTTP " + resp.status + " du backend.");
  const data = await resp.json();
  if (data && data.ok === false) throw new Error(data.error || "Erreur backend inconnue.");
  return data;
}

/** Service d'authentification (Étape 1). */
const AUTH = {
  session: null, // { token, email, nom, role, connectedAt }

  /** Recharge la session conservée dans localStorage (démarrage). */
  restore(){
    try{
      const raw = localStorage.getItem(APP_CONFIG.auth.storageKey);
      this.session = raw ? JSON.parse(raw) : null;
    } catch(e){ this.session = null; }
  },

  /** Persiste (ou efface) la session dans localStorage. */
  persist(){
    try{
      if (this.session) localStorage.setItem(APP_CONFIG.auth.storageKey, JSON.stringify(this.session));
      else localStorage.removeItem(APP_CONFIG.auth.storageKey);
    } catch(e){ /* stockage indisponible : session en mémoire seulement */ }
  },

  /** Le backend est-il configuré (URL renseignée) ? */
  isConfigured(){ return !!APP_CONFIG.backend.appsScriptUrl; },

  /** Une session utilisateur est-elle active ? */
  isConnected(){ return !!(this.session && this.session.token); },

  /** Connexion : valide email + PIN auprès du backend, stocke le jeton. */
  async login(email, pin){
    const res = await callBackend("login", { email: email, pin: pin });
    this.session = { token: res.token, email: res.email, nom: res.nom, role: res.role, connectedAt: new Date().toISOString() };
    this.persist();
    STATE.role = res.role; // le rôle applicatif suit désormais le serveur
    return this.session;
  },

  /** Déconnexion : efface la session locale puis révoque le jeton serveur. */
  async logout(){
    const token = this.session ? this.session.token : null;
    this.session = null;
    this.persist();
    if (token){
      try{ await callBackend("logout", { token: token }); }
      catch(e){ /* hors ligne : le jeton expirera de lui-même côté serveur */ }
    }
  },

  /**
   * Revalide la session au démarrage (arrière-plan). Trois issues :
   * · serveur joignable + jeton valide  → rôle/nom rafraîchis, true ;
   * · serveur joignable + jeton refusé  → session effacée, false ;
   * · serveur injoignable (terrain)     → session locale conservée, true.
   */
  async validate(){
    if (!this.isConnected() || !this.isConfigured()) return this.isConnected();
    try{
      const r = await callBackend("session", { token: this.session.token });
      if (r && r.valid){
        this.session.nom = r.nom; this.session.role = r.role;
        this.persist();
        STATE.role = r.role;
        return true;
      }
      this.session = null; this.persist();
      return false;
    } catch(e){
      return true; // réseau indisponible : on fait confiance à la session locale
    }
  },

  /** Initiales pour la chip utilisateur (ex : "KOUASSI Innocent" → "KI"). */
  initials(){
    const n = (this.session && this.session.nom) || (this.session && this.session.email) || "?";
    return n.split(/[\s.@_-]+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join("") || "?";
  },
};

  // force = écrasement volontaire après arbitrage. Renvoie la réponse complète
  // ({ village } ou { conflict:true, server }).
  async upsert(v, baseUpdatedAt, force){ return await callBackend("villages.upsert", { village: toRemotePayload(v), baseUpdatedAt: baseUpdatedAt || null, force: !!force }); },

/** Prépare une fiche pour l'envoi : sans photos (Drive, Étape 3) ni champs techniques. */
function toRemotePayload(v){
  const copy = structuredClone(v);
  delete copy._sync;
  delete copy._serverUpdatedAt;  // Étape 4 : champs techniques client
  delete copy._conflictServer;
  // Étape 3 : les URL Drive (https) voyagent vers Sheets ; les photos base64
  // (data:) n'y entrent jamais — elles partent séparément vers Drive.
  if (copy.photos){
    for (const k of Object.keys(copy.photos)){
      if (String(copy.photos[k]).indexOf("data:") === 0) copy.photos[k] = "";
    }
  }
  return copy;
}

function getPendingRTDeletes(){ try{ return JSON.parse(localStorage.getItem("fbms_pending_rt_deletes")||"[]"); }catch(e){ return []; } }

/**
 * Phase RT du moteur de synchronisation (appelée par syncNow) :
 * suppressions différées → push des fiches en attente → pull + fusion
 * (dernière écriture gagne ; le travail local non poussé reste prioritaire).
 */
async function syncRTPhase(tick){
  for (const id of getPendingRTDeletes()){ await RemoteRT.remove(id); if (tick) tick(); }
  setPendingRTDeletes([]);
  let locals = await RT_ADAPTER.list();
  for (const rec of locals){
    if (rec._sync !== "synced"){
      const resp = await RemoteRT.upsert(rec);
      rec._sync = "synced";
      rec._serverUpdatedAt = (resp && resp.rt && resp.rt.updatedAt) || rec.updatedAt;
      await RT_ADAPTER.upsert(rec);
      if (tick) tick();
    }
  }
  const remote = await RemoteRT.list();
  if (tick) tick();
  locals = await RT_ADAPTER.list();
  const map = new Map(locals.map(r=>[r.id, r]));
  const ids = new Set(remote.map(r=>r.id));
  for (const rr of remote){
    const lr = map.get(rr.id);
    if (lr && lr._sync !== "synced") continue; // travail local non poussé : prioritaire
    rr._sync = "synced";
    rr._serverUpdatedAt = rr.updatedAt;
    await RT_ADAPTER.upsert(rr);
  }
  for (const lr of locals){
    if (lr._sync === "synced" && !ids.has(lr.id)) await RT_ADAPTER.remove(lr.id);
  }
  STATE.rt = await RT_ADAPTER.list();
}

/**
 * Compression côté client avant envoi (terrain : bande passante limitée).
 * Redimensionne à maxDim px maximum et réencode en JPEG. En cas d'échec
 * (format exotique), l'image d'origine est conservée telle quelle.
 */
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        try{
          const scale = Math.min(1, (maxDim||1600) / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width*scale));
          const h = Math.max(1, Math.round(img.height*scale));
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality||0.8));
        } catch(err){ resolve(e.target.result); }
      };
      img.onerror = ()=>resolve(e.target.result);
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/**
 * Envoie vers Drive toutes les photos encore en base64 d'une fiche déjà
 * synchronisée, puis remplace le base64 par l'URL Drive dans le cache local.
 * Les échecs sont silencieux : la photo repartira à la prochaine synchro.
 */
async function uploadPendingPhotosFor(v){
  if (isDemoRecord(v) || !AUTH.isConnected()) return v;
  let changed = false;
  for (const [slot] of PHOTO_SLOTS){
    const src = v.photos && v.photos[slot];
    if (src && String(src).indexOf("data:") === 0){
      try{
        const r = await RemotePhotos.upload(v.id, slot, src);
        v.photos[slot] = r.url;
        v.photosDrive = v.photosDrive || {};
        v.photosDrive[slot] = { fileId: r.fileId, url: r.url, viewUrl: r.viewUrl };
        changed = true;
      } catch(e){ console.warn("[FBMS] Photo en attente d'envoi ("+slot+") :", e.message); }
    }
  }
  if (changed) await ADAPTER.upsert(v);
  return v;
}

/** Nombre de photos locales (base64) en attente d'envoi vers Drive. */
function countPendingPhotos(villages){
  let n = 0;
  for (const v of villages){
    if (isDemoRecord(v) || !v.photos) continue;
    for (const [slot] of PHOTO_SLOTS){ if (String(v.photos[slot]||"").indexOf("data:") === 0) n++; }
  }
  return n;
}

/** Barre fine en haut d'écran ; créée à la volée, masquée en fin de cycle. */
function setSyncProgress(done, total){
  let bar = document.getElementById("syncBar");
  if (!bar){
    bar = document.createElement("div");
    bar.id = "syncBar";
    bar.style.cssText = "position:fixed;top:0;left:0;height:3px;background:"+T.emerald+";width:0;z-index:60;transition:width .25s";
    document.body.appendChild(bar);
  }
  if (!total || done >= total){
    bar.style.width = "100%";
    setTimeout(()=>{ if (bar) bar.style.width = "0"; }, 700);
  } else {
    bar.style.width = Math.round((done/total)*100) + "%";

/** Applique le choix d'arbitrage puis rafraîchit l'écran. */
async function resolveConflict(id, choice){
  const v = STATE.villages.find(x=>x.id===id);
  if (!v || !v._conflictServer){ closeConflictModal(); return; }
  try{
    if (choice === "mine"){
      // Écrasement volontaire de la version serveur (force:true), tracé en audit.
      const r = await RemoteVillages.upsert(v, null, true);
      v._sync = "synced";
      v._serverUpdatedAt = (r && r.village && r.village.updatedAt) || v.updatedAt;
      delete v._conflictServer;
      await ADAPTER.upsert(v);
      await uploadPendingPhotosFor(v);
    } else {
      // Adoption de la version serveur ; les photos locales non envoyées sont conservées.
      const sv = v._conflictServer;
      sv.photos = sv.photos || {};
      for (const [slot] of PHOTO_SLOTS){
        const lp = v.photos && v.photos[slot];
        if (lp && String(lp).indexOf("data:") === 0) sv.photos[slot] = lp;
        else if (!sv.photos[slot] && lp) sv.photos[slot] = lp;
      }
      sv.photosDrive = Object.assign({}, v.photosDrive || {}, sv.photosDrive || {});
      sv._sync = "synced";
      sv._serverUpdatedAt = sv.updatedAt;
      await ADAPTER.upsert(sv);
    }
    STATE.villages = await ADAPTER.list();
    closeConflictModal();
    renderContent();
  } catch(e){
    alert("Échec de la résolution : " + e.message);
  }
}

/* Suppressions effectuées hors ligne, à rejouer à la prochaine synchro. */
function getPendingDeletes(){ try{ return JSON.parse(localStorage.getItem("fbms_pending_deletes")||"[]"); }catch(e){ return []; } }
function setPendingDeletes(arr){ try{ localStorage.setItem("fbms_pending_deletes", JSON.stringify(arr)); }catch(e){} }
function addPendingDelete(id){ const a = getPendingDeletes(); if (a.indexOf(id) < 0){ a.push(id); setPendingDeletes(a); } }

/** Affiche l'état de synchro dans la topbar (sans bloquer si absent du DOM). */
function setSyncStatus(msg, color){
  const el = document.getElementById("syncStatus");

}

let SYNC_RUNNING = false;
/**
 * Moteur de synchronisation (Étapes 2 à 4) : manuelle, automatique (5 min)
 * et à la reprise du réseau. Barre de progression + contrôle de conflits.
 * Ordre : 1) suppressions différées (fiches puis photos)  2) push des fiches
 * en attente avec détection de conflit  2b) envoi des photos base64 vers
 * Drive  3) pull + fusion (photos locales conservées, travail local non
 * poussé ou en conflit jamais écrasé)  4) répercussion des suppressions
 * distantes.
 */
async function syncNow(silent){
  if (!AUTH.isConfigured()){ if (!silent) alert("Backend Cloud non configuré (Administration > Connexion Cloud)."); return; }
  if (!AUTH.isConnected()){ if (!silent) openLoginModal(); return; }
  if (SYNC_RUNNING) return;
  SYNC_RUNNING = true;
  setSyncStatus("Synchronisation…", T.inkSoft);
  // Étape 4 : barre de progression + comptage des conflits.
  let done = 0, total = 0, conflicts = 0;
  try{
    const dels = getPendingDeletes();
    const pdels = getPendingPhotoDeletes();
    const locals0 = await ADAPTER.list();
    const rtLocals0 = await RT_ADAPTER.list();
    const prodLocals0 = await PROD_ADAPTER.list();
    total = dels.length + pdels.length
      + locals0.filter(v=>!isDemoRecord(v) && v._sync !== "synced").length
      + countPendingPhotos(locals0)
      + getPendingRTDeletes().length + rtLocals0.filter(r=>r._sync !== "synced").length + 1 // v0.10 : phase RT
      + getPendingProdDeletes().length + prodLocals0.filter(p=>p._sync !== "synced").length // v0.11 : push producteurs
      + 2; // + liste distante + application locale
    setSyncProgress(done, total);

    // 1. Suppressions faites hors ligne, rejouées en premier
    for (const id of dels){ await RemoteVillages.remove(id); done++; setSyncProgress(done, total); }
    setPendingDeletes([]);
    // Étape 3 : suppressions de photos différées
    for (const p of pdels){ await RemotePhotos.remove(p.id, p.slot); done++; setSyncProgress(done, total); }
    setPendingPhotoDeletes([]);

    // 2. Push des fiches jamais envoyées ou modifiées localement
    let locals = await ADAPTER.list();
    for (const v of locals){
      if (isDemoRecord(v)) continue;
      if (v._sync !== "synced"){
        // Étape 4 : contrôle de conflit — si le serveur détient une version
        // plus récente, la fiche passe en arbitrage au lieu d'être écrasée.
        const r = await RemoteVillages.upsert(v, v._serverUpdatedAt || null, false);
        if (r && r.conflict){
          v._conflictServer = r.server;
          conflicts++;
        } else {
          v._sync = "synced";
          v._serverUpdatedAt = (r && r.village && r.village.updatedAt) || v.updatedAt;
          delete v._conflictServer;
        }
        await ADAPTER.upsert(v);
        done++; setSyncProgress(done, total);
      }
    }

    // 2b. Étape 3 : envoi vers Drive des photos encore en base64 (fiches déjà poussées)
    locals = await ADAPTER.list();
    for (const v of locals){
      if (!isDemoRecord(v) && v._sync === "synced"){
        const nb = countPendingPhotos([v]);
        if (nb > 0){ await uploadPendingPhotosFor(v); done += nb; setSyncProgress(done, total); }
      }
    }

    // 3. Pull + fusion
    const remote = await RemoteVillages.list();
    done++; setSyncProgress(done, total);
    locals = await ADAPTER.list();
    const localMap = new Map(locals.map(v=>[v.id, v]));
    const remoteIds = new Set(remote.map(v=>v.id));
    for (const rv of remote){
      const lv = localMap.get(rv.id);
      if (lv && (lv._sync !== "synced" || lv._conflictServer)) continue; // travail local non poussé ou en conflit : prioritaire
      // Étape 3 : fusion photo par photo — un base64 local (pas encore envoyé)
      // est prioritaire ; sinon l'URL Drive du serveur ; sinon la valeur locale.
      const merged = { entree:"", chef:"", route:"", lieuCollecte:"", rt:"", gps:"" };
      for (const k of Object.keys(merged)){
        const lp = (lv && lv.photos && lv.photos[k]) || "";
        const rp = (rv.photos && rv.photos[k]) || "";
        merged[k] = (String(lp).indexOf("data:") === 0) ? lp : (rp || lp);
      }
      rv.photos = merged;
      rv.photosDrive = Object.assign({}, (lv && lv.photosDrive) || {}, rv.photosDrive || {});
      rv._sync = "synced";
      rv._serverUpdatedAt = rv.updatedAt; // Étape 4 : référence du contrôle de conflit
      await ADAPTER.upsert(rv);
    }

    // 4. Fiches supprimées sur le serveur → retirées du cache local
    for (const lv of locals){
      if (isDemoRecord(lv)) continue;
      if (lv._sync === "synced" && !remoteIds.has(lv.id)) await ADAPTER.remove(lv.id);
    }

    // 5. v0.10 : phase RT (suppressions différées, push, pull + fusion)
    await syncRTPhase(()=>{ done++; setSyncProgress(done, total); });

    // 6. v0.11 : producteurs — push uniquement (le pull se fait PAR VILLAGE,
    // à la demande, pour ne jamais télécharger toute la base sur un téléphone).
    await syncProducteursPushPhase(()=>{ done++; setSyncProgress(done, total); });

    STATE.villages = await ADAPTER.list();
    try{ localStorage.setItem("fbms_last_sync", new Date().toISOString()); }catch(e){}
    setSyncProgress(total, total);
    if (conflicts > 0) setSyncStatus("✔ Synchronisé — " + conflicts + " conflit(s) à arbitrer (Base de données)", T.orange);
    else setSyncStatus("✔ Synchronisé à " + new Date().toLocaleTimeString("fr-FR"), T.emerald);
    // v0.11.1 : ne JAMAIS redessiner l'écran pendant une saisie — c'était la
    // cause des pertes de formulaire signalées sur le terrain. Les données
    // synchronisées sont en base locale ; l'écran se rafraîchira à la
    // prochaine navigation de l'utilisateur.
    if (!isEditing()) renderContent();
  } catch(e){
    setSyncProgress(0, 0);
    setSyncStatus("✖ " + e.message, T.red);
  } finally {
    SYNC_RUNNING = false;
  }
}

function setPath(obj, path, value){
  const keys = path.split(".");
  let cur = obj;
  for (let i=0;i<keys.length-1;i++){
    const k = keys[i], nextKey = keys[i+1];
    if (cur[k] === undefined) cur[k] = /^\d+$/.test(nextKey) ? [] : {};
    cur = cur[k];
  }
  cur[keys[keys.length-1]] = value;
}

async function saveForm(){
  const base = STATE.formId==="new" ? blankVillage() : STATE.villages.find(v=>v.id===STATE.formId);
  const draft = collectFormData(base);
  draft.updatedAt = new Date().toISOString(); // Étape 0 : horodatage systématique (base de la future synchro)
  // Étape 1 : traçabilité utilisateur quand une session est active.
  if (AUTH.isConnected()){
    if (!draft.createdBy) draft.createdBy = AUTH.session.email;
    draft.updatedBy = AUTH.session.email;
  }
  // Étape 2 : écriture "local d'abord" (zéro perte), puis envoi vers Sheets.
  if (!isDemoRecord(draft)) draft._sync = "pending";
  await ADAPTER.upsert(draft);
  try{ localStorage.removeItem("fbms_form_draft"); }catch(e){} // v0.11.1 : brouillon consommé
  // Étape 3 : photos retirées du formulaire → suppression du fichier Drive
  // correspondant (immédiate si connecté, différée sinon).
  if (AUTH.isConfigured() && !isDemoRecord(draft) && base && base.photosDrive){
    for (const slot of Object.keys(base.photosDrive)){
      if (!draft.photos || !draft.photos[slot]){
        if (draft.photosDrive) delete draft.photosDrive[slot];
        if (AUTH.isConnected()){
          try{ await RemotePhotos.remove(draft.id, slot); }
          catch(e){ addPendingPhotoDelete(draft.id, slot); }
        } else addPendingPhotoDelete(draft.id, slot);
      }
    }
    await ADAPTER.upsert(draft);
  }
  if (AUTH.isConnected() && !isDemoRecord(draft)){
    try{
      // Étape 4 : contrôle de conflit optimiste à l'enregistrement.
      const r = await RemoteVillages.upsert(draft, draft._serverUpdatedAt || null, false);
      if (r && r.conflict){
        draft._conflictServer = r.server; // reste "pending", badge Conflit affiché
        await ADAPTER.upsert(draft);
        alert("Conflit : cette fiche a été modifiée par " + ((r.server && r.server.updatedBy) || "un autre utilisateur") + " entre-temps. Ouvrez la Base de données et cliquez le badge rouge pour arbitrer.");
      } else {
        draft._sync = "synced";
        draft._serverUpdatedAt = (r && r.village && r.village.updatedAt) || draft.updatedAt;
        delete draft._conflictServer;
        await ADAPTER.upsert(draft);
        // Étape 3 : la ligne existe côté serveur → envoi des photos base64 vers Drive.
        await uploadPendingPhotosFor(draft);
      }
    } catch(e){
      // La fiche reste "pending" : elle partira à la prochaine synchronisation.
      console.warn("[FBMS] Envoi Sheets différé :", e.message);
    }
  }
  STATE.villages = await ADAPTER.list();
  STATE.active="database"; STATE.formId=null;
  buildSidebar(); renderContent();
}
async function deleteVillageAction(id){
  if (!confirm("Supprimer définitivement cette fiche village ?")) return;
  await ADAPTER.remove(id);
  // Étape 2 : propagation vers Google Sheets (suppression douce côté serveur),
  // ou mise en file d'attente si le réseau est indisponible.
  if (AUTH.isConfigured() && String(id).indexOf("v_demo_") !== 0){
    if (AUTH.isConnected()){
      try{ await RemoteVillages.remove(id); }
      catch(e){ addPendingDelete(id); }

    }
  }

  renderContent();
}
function collectFormData(baseRecord){
  const draft = structuredClone(baseRecord);
  document.querySelectorAll('#recensement-form [data-path]').forEach(el=>{
    const path = el.dataset.path;
    let val;
    if (el.type==="checkbox") val = el.checked;
    else if (el.type==="number" || el.type==="range") val = el.value==="" ? "" : Number(el.value);
    else val = el.value;
    setPath(draft, path, val);
  });
  return draft;
}

}
function computeEvolution(){

function getFilteredVillages(){
  let rows = STATE.villages.map(v=>({v,score:scoreOf(v)}));
  if (STATE.query) rows = rows.filter(({v})=> (v.s1.village+" "+v.s1.enqueteur+" "+v.s1.cluster+" "+v.s1.departement).toLowerCase().includes(STATE.query.toLowerCase()));
  if (STATE.regionFilter) rows = rows.filter(({v})=>v.s1.region===STATE.regionFilter);
  if (STATE.tierFilter) rows = rows.filter(({score})=>tierFor(score).key===STATE.tierFilter);
  if (STATE.statutFilter) rows = rows.filter(({v})=>statutOf(v)===STATE.statutFilter); // v0.9
  if (STATE.camionOnly) rows = rows.filter(({v})=>v.s5.camion10T);
  rows.sort((a,b)=>{
    const map = { score:[a.score,b.score], potentiel:[a.v.s3.potentielMT,b.v.s3.potentielMT], village:[a.v.s1.village,b.v.s1.village] };
    const [av,bv] = map[STATE.sortKey] || map.score;
    if (typeof av==="string") return STATE.sortDir==="asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    return STATE.sortDir==="asc" ? av-bv : bv-av;
  });
  return rows;
}
function exportCSV(){
  const rows = getFilteredVillages().map(r=>r.v);
  const headers = ["Village","Région","Département","Score","Classement","Potentiel MT","Enquêteur","RT identifiés"];
  const lines = rows.map(v=>{ const score=scoreOf(v); return [v.s1.village,v.s1.region,v.s1.departement,score,tierFor(score).label,v.s3.potentielMT,v.s1.enqueteur,v.s7.candidats.filter(c=>c.nom).length].join(","); });
  // Étape 0 : correction — le séparateur était "\\n" littéral (CSV sur une seule ligne). "\r\n" = standard RFC 4180, compatible Excel.
  downloadBlob(new Blob([[headers.join(","),...lines].join("\r\n")],{type:"text/csv"}), "anagroci_villages.csv");
}

/**
 * Export Excel natif (.xlsx) — v0.6.1. Respecte les filtres actifs de la vue
 * (recherche, région, classement, camion 10T) via getFilteredVillages().
 * 26 colonnes exploitables directement par la Direction. Librairie SheetJS
 * chargée en CDN : nécessite d'avoir ouvert la page au moins une fois en ligne.
 */
function exportExcel(){
  if (typeof XLSX === "undefined"){
    alert("La librairie Excel n'a pas pu être chargée (ouvrez la page une fois avec Internet). L'export CSV reste disponible.");
    return;
  }
  const filtered = getFilteredVillages();
  if (filtered.length === 0){ alert("Aucune fiche à exporter avec les filtres actuels."); return; }
  const rows = filtered.map(({v, score})=>({
    "Village": v.s1.village || "",
    "Région": v.s1.region || "",
    "Département": v.s1.departement || "",
    "Sous-préfecture": v.s1.sousPrefecture || "",
    "Cluster": v.s1.cluster || "",
    "Date visite": v.s1.dateVisite || "",
    "Enquêteur": v.s1.enqueteur || "",
    "GPS Latitude": v.s1.gpsLat || "",
    "GPS Longitude": v.s1.gpsLng || "",
    "Distance Hub (km)": Number(v.s1.distanceHub) || 0,
    "Nb producteurs": Number(v.s3.nbProducteurs) || 0,
    "Prod. moyenne (kg)": Number(v.s3.prodMoyenneKg) || 0,
    "Potentiel (MT)": Number(v.s3.potentielMT) || 0,
    "Potentiel sécurisé (MT)": Number(v.s3.potentielSecuriseMT) || 0,
    "Score /100": score,
    "Classement": tierFor(score).label,
    "Type d'accès": v.s5.typeAcces || "",
    "Camion 10T": v.s5.camion10T ? "Oui" : "Non",
    "Camion 30T": v.s5.camion30T ? "Oui" : "Non",
    "RT identifiés": v.s7.candidats.filter(c=>c.nom).length,
    "Chef de village": v.s2.chef.nom || "",
    "Tél. chef": v.s2.chef.telephone || "",
    "Acheteurs concurrents": v.s4.acheteurs.length,
    "Décision": v.s9.decision || "",
    "Créé par": v.createdBy || "",
    "Modifié le": v.updatedAt ? new Date(v.updatedAt).toLocaleString("fr-FR") : "",
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  // Largeurs de colonnes lisibles (au moins la largeur de l'en-tête)
  ws["!cols"] = Object.keys(rows[0]).map(k=>({ wch: Math.max(12, k.length + 2) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "VILLAGES");
  XLSX.writeFile(wb, "ANAGROCI_FBMS_villages_" + new Date().toISOString().slice(0,10) + ".xlsx");
}

   ========================================================================== */

/** API distante producteurs (backend v1.7) — chargement PAR VILLAGE. */
const RemoteProducteurs = {
  async listByVillage(villageId){ const r = await callBackend("producteurs.listByVillage", { villageId: villageId }); return r.producteurs || []; },
  async upsert(p){
    const copy = structuredClone(p);
    delete copy._sync; delete copy._serverUpdatedAt;
    return await callBackend("producteurs.upsert", { producteur: copy });
  },
  async remove(id){ await callBackend("producteurs.remove", { id: id }); },
};

/* Statuts producteur — alignés avec PROD_STATUTS_VALIDES du backend v1.7. */
const PROD_STATUTS = [
  { key:"Identifié", color:"#7A8580" },
  { key:"Enrôlé",    color:"#D9A441" },
  { key:"Actif",     color:"#1F9D6E" },
  { key:"Inactif",   color:"#C0392B" },
];
function prodStatutPill(s){
  const o = PROD_STATUTS.find(x=>x.key===s);
  const c = o ? o.color : "#4B5A52";
  return '<span class="ff-body inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-semibold whitespace-nowrap" style="background-color:'+c+'1A;color:'+c+'">'+s+'</span>';
}

/** Fiche producteur vierge — schéma validé (noyau + enrichissement + suivi). */
function blankProducteur(){
  return {
    id: "p_" + Date.now() + "_" + rand(1000,9999),
    code: "TMP-" + rand(100,999),   // code définitif attribué par le serveur à la 1re synchro
    nom:"", sexe:"", anneeNaissance:"", telephone:"", telTitulaire:"Propre",
    campement:"", rtId:"", cooperative:"",
    superficieHa:"", prodPrecKg:"", nbArbres:"", autresCultures:"",
    acheteurHabituel:"", prixPrecedent:"", engagementKg:"",
    paiementMode:"", mobileMoneyNum:"", mobileMoneyTitulaire:"",
    pieceType:"", pieceNum:"",
    villageId:"", villageNom:"",
    statut:"Identifié",
    suivi:{ tonnageLivreKg:"", montantPaye:"", nbLivraisons:"", derniereLivraison:"" }, // alimenté par les futures transactions
    notes:"",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
}

/* Suppressions producteurs hors ligne, à rejouer à la synchro. */
function getPendingProdDeletes(){ try{ return JSON.parse(localStorage.getItem("fbms_pending_prod_deletes")||"[]"); }catch(e){ return []; } }
function setPendingProdDeletes(arr){ try{ localStorage.setItem("fbms_pending_prod_deletes", JSON.stringify(arr)); }catch(e){} }
function addPendingProdDelete(id){ const a = getPendingProdDeletes(); if (a.indexOf(id) < 0){ a.push(id); setPendingProdDeletes(a); } }

/** Phase producteurs du moteur de synchro : PUSH uniquement (pull par village). */
async function syncProducteursPushPhase(tick){
  for (const id of getPendingProdDeletes()){ await RemoteProducteurs.remove(id); if (tick) tick(); }
  setPendingProdDeletes([]);
  const locals = await PROD_ADAPTER.list();
  for (const p of locals){
    if (p._sync !== "synced"){
      const resp = await RemoteProducteurs.upsert(p);
      const srv = resp && resp.producteur;
      if (srv){ p.code = srv.code || p.code; p._serverUpdatedAt = srv.updatedAt; } // code définitif serveur
      p._sync = "synced";
      await PROD_ADAPTER.upsert(p);
      if (tick) tick();
    }
  }
  STATE.producteurs = await PROD_ADAPTER.list();
}

/** Rapatrie les producteurs d'UN village et fusionne dans le cache local. */
async function loadProducteursVillage(villageId, silent){
  if (!villageId || !(AUTH.isConnected() && navigator.onLine)) return; // hors ligne : cache local seul
  try{
    const remote = await RemoteProducteurs.listByVillage(villageId);
    const locals = (await PROD_ADAPTER.list()).filter(p=>p.villageId===villageId);
    const localMap = new Map(locals.map(p=>[p.id, p]));
    const remoteIds = new Set(remote.map(p=>p.id));
    for (const rp of remote){
      const lp = localMap.get(rp.id);
      if (lp && lp._sync !== "synced") continue; // enrôlement local non poussé : prioritaire
      rp._sync = "synced"; rp._serverUpdatedAt = rp.updatedAt;
      await PROD_ADAPTER.upsert(rp);
    }
    for (const lp of locals){
      if (lp._sync === "synced" && !remoteIds.has(lp.id)) await PROD_ADAPTER.remove(lp.id);
    }
    STATE.producteurs = await PROD_ADAPTER.list();
    if (!silent) renderContent();
  } catch(e){
    if (!silent) setSyncStatus("✖ Producteurs : " + e.message, T.red);
  }
}

/** Enregistre l'enrôlement : validations noyau, local d'abord, puis Sheets. */
async function saveProducteur(){
  captureProdModalFields();
  const p = PROD_EDIT;
  const manquants = [];
  if (!p.nom) manquants.push("nom");
  if (!p.sexe) manquants.push("sexe");
  if (!p.anneeNaissance) manquants.push("année de naissance");
  if (!p.telephone) manquants.push("téléphone");
  if (!p.campement) manquants.push("campement");
  if (!p.superficieHa) manquants.push("superficie");
  if (!p.prodPrecKg) manquants.push("production précédente");
  if (manquants.length){ alert("Champs obligatoires manquants : " + manquants.join(", ") + "."); return; }
  if (!p.villageId){ alert("Aucun village sélectionné."); return; }
  p.updatedAt = new Date().toISOString();
  if (AUTH.isConnected()){
    if (!p.createdBy) p.createdBy = AUTH.session.email;
    p.updatedBy = AUTH.session.email;
  }
  p._sync = "pending";
  await PROD_ADAPTER.upsert(p);
  if (AUTH.isConnected()){
    try{
      const resp = await RemoteProducteurs.upsert(p);
      const srv = resp && resp.producteur;
      if (srv){ p.code = srv.code || p.code; p._serverUpdatedAt = srv.updatedAt; }
      p._sync = "synced";
      await PROD_ADAPTER.upsert(p);
    } catch(e){ console.warn("[FBMS] Producteur en attente de synchro :", e.message); }
  }
  STATE.producteurs = await PROD_ADAPTER.list();
  closeProdModal();
  renderContent();
}

/** Supprime un producteur (local + serveur, différé si hors ligne). */
async function deleteProducteur(id){
  const p = STATE.producteurs.find(x=>x.id===id);
  if (!confirm("Supprimer le producteur « " + ((p && p.nom) || id) + " » ?")) return;
  await PROD_ADAPTER.remove(id);
  if (AUTH.isConfigured()){
    if (AUTH.isConnected()){
      try{ await RemoteProducteurs.remove(id); }
      catch(e){ addPendingProdDelete(id); }
    } else {
      addPendingProdDelete(id);
    }
  }
  STATE.producteurs = await PROD_ADAPTER.list();
  renderContent();
}

/**
 * Import consolidé des candidats RT depuis les fiches villages (section 7).
 * Dédoublonnage : par téléphone normalisé, puis par nom si pas de téléphone.
 */
async function importRTFromVillages(){
  const byPhone = new Set(STATE.rt.map(r=>normPhone(r.telephone)).filter(p=>p));
  const byName = new Set(STATE.rt.map(r=>(r.nom||"").trim().toLowerCase()).filter(n=>n));
  let created = 0, skipped = 0;
  for (const v of STATE.villages){
    if (isDemoRecord(v)) continue;
    for (const c of v.s7.candidats){
      if (!c.nom) continue;
      const p = normPhone(c.telephone);
      const dup = (p && byPhone.has(p)) || (!p && byName.has(c.nom.trim().toLowerCase()));
      if (dup){ skipped++; continue; }
      const r = blankRT();
      r.nom = c.nom; r.telephone = c.telephone || ""; r.activite = c.activite || ""; r.instruction = c.instruction || "";
      r.smartphone = !!c.smartphone; r.compteBancaire = !!c.compteBancaire; r.compteWave = !!c.compteWave;
      r.reputation = c.reputation || "";
      r.villageId = v.id; r.villageNom = (v.s1 && v.s1.village) || "";
      r.historique = [{ date:new Date().toISOString(), par:(AUTH.isConnected()?AUTH.session.email:""), type:"Import", note:"Importé depuis la fiche village " + r.villageNom }];
      if (AUTH.isConnected()){ r.createdBy = AUTH.session.email; r.updatedBy = AUTH.session.email; }
      r._sync = "pending";
      await RT_ADAPTER.upsert(r);
      if (p) byPhone.add(p); else byName.add(c.nom.trim().toLowerCase());
      created++;
    }
  }
  STATE.rt = await RT_ADAPTER.list();
  renderContent();
  alert(created + " RT importé(s), " + skipped + " doublon(s) ignoré(s)." + (created ? " Synchronisation en cours vers Google Sheets." : ""));
  if (created && AUTH.isConnected()) syncNow(true);
}

/** Signaux de risque d'une fiche (affichés dans la file d'arbitrage). */
function riskBadges(v){
  const out = [];
  if (!v.s8.pasConflitFoncier) out.push("Conflit foncier");
  if (!v.s8.pasConflitCommunautaire) out.push("Conflit communautaire");
  if ((v.s4.acheteurs||[]).length >= 3) out.push("Concurrence forte");
  if (!v.s5.camion10T) out.push("Non accessible 10T");
  const rt = v.s7.candidats.filter(c=>c.nom).length;
  if (rt < 2) out.push("RT insuffisants ("+rt+"/3)");
  return out;
}

/** Change le statut d'une fiche : local d'abord, puis Sheets (même chemin que saveForm). */
async function setVillageStatut(id, statut){
  const v = STATE.villages.find(x=>x.id===id);
  if (!v) return;
  v.statut = statut;
  v.updatedAt = new Date().toISOString();
  if (AUTH.isConnected()){
    if (!v.createdBy) v.createdBy = AUTH.session.email;
    v.updatedBy = AUTH.session.email;
  }
  if (!isDemoRecord(v)) v._sync = "pending";
  await ADAPTER.upsert(v);
  if (AUTH.isConnected() && !isDemoRecord(v)){
    try{
      const r = await RemoteVillages.upsert(v, v._serverUpdatedAt || null, false);
      if (r && r.conflict){ v._conflictServer = r.server; }
      else { v._sync = "synced"; v._serverUpdatedAt = (r && r.village && r.village.updatedAt) || v.updatedAt; delete v._conflictServer; }
      await ADAPTER.upsert(v);
    } catch(e){ console.warn("[FBMS] Statut en attente de synchro :", e.message); }
  }
  STATE.villages = await ADAPTER.list();
  renderContent();
}

/** Action d'arbitrage avec confirmation. */
async function decisionAction(id, statut){
  const v = STATE.villages.find(x=>x.id===id);
  const nom = (v && v.s1 && v.s1.village) || id;
  if (!confirm("Passer « " + nom + " » au statut « " + statut + " » ?")) return;
  await setVillageStatut(id, statut);
}

  } else {
    html += '<div class="space-y-3">';

      html += '<div class="rounded-xl p-4" style="background:#fff;border:1px solid '+T.line+'">'

        + '<div class="ff-body text-xs mt-1" style="color:'+T.inkSoft+'">Potentiel <span class="ff-mono font-semibold" style="color:'+T.ink+'">'+(v.s3.potentielMT||0)+' MT</span> · Sécurisé <span class="ff-mono">'+(v.s3.potentielSecuriseMT||0)+' MT</span> · RT '+v.s7.candidats.filter(c=>c.nom).length+'/3</div>'
        + (risks.length ? '<div class="flex flex-wrap gap-1 mt-1.5">'+risks.map(rk=>'<span class="text-[10px] rounded-full px-2 py-0.5 font-semibold" style="background-color:'+T.red+'14;color:'+T.red+'">'+rk+'</span>').join('')+'</div>'
                        : '<div class="text-[10px] mt-1.5 ff-body" style="color:'+T.emerald+'">Aucun signal de risque</div>')
        + '</div></div>'

        + (canDecide
          ? '<div class="flex flex-col gap-1.5">'
            + '<button onclick="decisionAction(\''+v.id+'\',\'Approuvé BM\')" class="ff-body text-xs font-semibold rounded-lg px-3 py-1.5" style="background-color:'+T.emerald+';color:#fff">Approuver</button>'

let MAIN_MAP = null;
function mountMapModule(){
  const el = document.getElementById("mainMap");
  if (!el || !window.L) return;
  if (MAIN_MAP){ MAIN_MAP.remove(); MAIN_MAP = null; }
  MAIN_MAP = L.map("mainMap", { scrollWheelZoom:true });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"© OpenStreetMap contributors", maxZoom:18 }).addTo(MAIN_MAP);
  const points = STATE.villages.filter(v=>v.s1.gpsLat && v.s1.gpsLng);
  if (points.length===0){ MAIN_MAP.setView(CI_CENTER, 7); return; }
  const markers = [];
  points.forEach(v=>{
    const score = scoreOf(v);
    const tier = tierFor(score);
    const m = L.circleMarker([Number(v.s1.gpsLat), Number(v.s1.gpsLng)], { radius:9, color:"#fff", weight:2, fillColor:tier.color, fillOpacity:0.95 }).addTo(MAIN_MAP);
    m.bindPopup('<div style="font-family:IBM Plex Sans,sans-serif;min-width:170px">'
      + '<div style="font-weight:600;font-size:13px;margin-bottom:2px">'+v.s1.village+'</div>'
      + '<div style="font-size:11px;color:#4B5A52;margin-bottom:8px">'+v.s1.departement+' · Score '+Math.round(score)+'/100</div>'
      + '<button onclick="openVillage(\''+v.id+'\')" style="font-size:11px;font-weight:600;background:'+T.forest700+';color:#fff;border:none;border-radius:6px;padding:5px 9px;cursor:pointer">Voir la fiche</button></div>');
    markers.push(m);
  });
  const group = L.featureGroup(markers);
  MAIN_MAP.fitBounds(group.getBounds().pad(0.25));
}

/** Vide entièrement la base locale après confirmation (Étape 0). */
async function clearLocalData(){
  if (!confirm("Supprimer TOUTES les fiches stockées sur cet appareil ? Cette action est irréversible.")) return;

  else for (const v of await ADAPTER.list()) await ADAPTER.remove(v.id);

  renderContent();
}

/** Soumission de la création : validation serveur, PIN affiché une seule fois. */
async function submitCreateUser(){
  const nom = (document.getElementById("nuNom").value || "").trim();
  const email = (document.getElementById("nuEmail").value || "").trim().toLowerCase();
  const role = document.getElementById("nuRole").value;
  const pin = (document.getElementById("nuPin").value || "").trim();
  const err = document.getElementById("nuError");
  const btn = document.getElementById("nuSubmit");
  err.style.display = "none";
  btn.disabled = true; btn.textContent = "Création…";
  try{
    await RemoteUsers.create(email, nom, role, pin);
    closeUserModal();
    alert("Compte créé.\n\nÀ transmettre à " + nom + " :\nEmail : " + email + "\nPIN : " + pin + "\n\nCe PIN ne sera plus jamais affiché.");
    loadUsersAdmin();
  } catch(e){
    err.textContent = e.message;
    err.style.display = "block";
    btn.disabled = false; btn.textContent = "Créer le compte";
  }
}

/** Active/désactive un compte (jamais le sien — refusé aussi côté serveur). */
async function toggleUserActive(email, actif){
  if (!confirm((actif ? "Réactiver" : "Désactiver") + " le compte " + email + " ?")) return;
  try{ await RemoteUsers.setActive(email, actif); }
  catch(e){ alert("Échec : " + e.message); }
  loadUsersAdmin();
}

/** Change le rôle d'un compte depuis le sélecteur du tableau. */
async function changeUserRole(email, selectEl){
  const role = selectEl.value;
  if (!confirm("Donner le rôle « " + role + " » à " + email + " ?")){ loadUsersAdmin(); return; }
  try{ await RemoteUsers.setRole(email, role); }
  catch(e){ alert("Échec : " + e.message); }
  loadUsersAdmin();
}

/** Réinitialise le PIN d'un compte (nouveau PIN affiché une seule fois). */
async function resetUserPin(email){
  const pin = prompt("Nouveau PIN pour " + email + " (4 caractères minimum) :", genPin());
  if (pin === null) return;
  if (pin.trim().length < 4){ alert("PIN trop court."); return; }
  try{
    await RemoteUsers.setPin(email, pin.trim());
    alert("PIN réinitialisé.\n\nÀ transmettre :\nEmail : " + email + "\nPIN : " + pin.trim() + "\n\nCe PIN ne sera plus jamais affiché.");
  } catch(e){ alert("Échec : " + e.message); }
}

let FORM_MAP = null, FORM_MARKER = null;
function placeFormMarker(lat, lng){
  if (!FORM_MAP) return;
  if (FORM_MARKER) FORM_MAP.removeLayer(FORM_MARKER);
  FORM_MARKER = L.marker([lat,lng], { draggable:true }).addTo(FORM_MAP);
  FORM_MARKER.on("dragend", function(ev){ const p = ev.target.getLatLng(); setFormGps(p.lat, p.lng, false); });
}
function setFormGps(lat, lng, moveMap){
  const latInput = document.querySelector('[data-path="s1.gpsLat"]');
  const lngInput = document.querySelector('[data-path="s1.gpsLng"]');
  if (latInput) latInput.value = lat.toFixed(5);
  if (lngInput) lngInput.value = lng.toFixed(5);
  if (moveMap !== false && FORM_MAP) FORM_MAP.setView([lat,lng], Math.max(FORM_MAP.getZoom(), 13));
  flashAutoSave();
}
function mountFormMiniMap(initialLat, initialLng){
  const el = document.getElementById("formMiniMap");
  if (!el || !window.L) return;
  if (FORM_MAP){ FORM_MAP.remove(); FORM_MAP = null; FORM_MARKER = null; }
  const hasCoords = initialLat && initialLng;
  const lat = Number(initialLat) || CI_CENTER[0];
  const lng = Number(initialLng) || CI_CENTER[1];
  FORM_MAP = L.map("formMiniMap", { scrollWheelZoom:true }).setView([lat,lng], hasCoords ? 13 : 7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"© OpenStreetMap contributors", maxZoom:18 }).addTo(FORM_MAP);
  if (hasCoords) placeFormMarker(lat, lng);
  FORM_MAP.on("click", function(e){ placeFormMarker(e.latlng.lat, e.latlng.lng); setFormGps(e.latlng.lat, e.latlng.lng, false); });
}
function syncMapFromInputs(){
  const lat = Number(document.querySelector('[data-path="s1.gpsLat"]').value);
  const lng = Number(document.querySelector('[data-path="s1.gpsLng"]').value);
  if (!lat || !lng || !FORM_MAP) return;
  placeFormMarker(lat, lng);
  FORM_MAP.setView([lat,lng], 14);
}
function useGeolocation(){
  if (!navigator.geolocation){ alert("La géolocalisation n'est pas disponible sur cet appareil ou ce navigateur."); return; }
  const btn = document.getElementById("geolocBtn");
  const original = btn ? btn.innerHTML : "";
  if (btn) btn.textContent = "Localisation en cours…";
  navigator.geolocation.getCurrentPosition(function(pos){
    setFormGps(pos.coords.latitude, pos.coords.longitude, true);
    placeFormMarker(pos.coords.latitude, pos.coords.longitude);
    if (btn) btn.innerHTML = original; if (window.lucide) lucide.createIcons();
  }, function(err){
    if (btn) btn.innerHTML = original; if (window.lucide) lucide.createIcons();
    alert("Impossible de récupérer la position : " + err.message);
  }, { enableHighAccuracy:true, timeout:10000 });
}

function handlePhotoUpload(inputEl, slot, label){
  const file = inputEl.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")){ alert("Veuillez sélectionner un fichier image (JPG, PNG…)."); return; }
  if (file.size > 6*1024*1024){ alert("Image trop lourde (max 6 Mo). Compressez-la avant import."); return; }
  // Étape 3 : compression avant stockage (économie de bande passante terrain,
  // affichage immédiat conservé — l'envoi Drive a lieu à l'enregistrement).
  compressImageFile(file, 1600, 0.8).then(function(dataUrl){
    document.getElementById("photoWrap_"+slot).outerHTML = photoTileHTML(slot, label, dataUrl);
    if (window.lucide) lucide.createIcons();
    flashAutoSave();

let autoSaveTimer = null;
/**
 * v0.11.1 : sauvegarde RÉELLE du brouillon de saisie (anti-perte).
 * À chaque frappe (débouncé 700 ms), l'état complet du formulaire est
 * enregistré dans localStorage (photos exclues : elles dépassent le quota ;
 * elles restent protégées par l'absence de re-rendu pendant la saisie).
 * Le brouillon est restauré automatiquement par FormView à la réouverture.
 */
function flashAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(()=>{
    let saved = false;
    try{
      if (document.getElementById("recensement-form") && STATE.formId){
        const base = STATE.formId==="new" ? blankVillage() : STATE.villages.find(v=>v.id===STATE.formId);
        if (base){
          const copy = structuredClone(collectFormData(base));
          copy.photos = {}; // exclues du brouillon (volume localStorage)
          copy._draftFor = STATE.formId;
          copy._draftAt = new Date().toISOString();
          localStorage.setItem("fbms_form_draft", JSON.stringify(copy));
          saved = true;
        }
      }
    }catch(e){ /* quota ou stockage indisponible : le bouton Enregistrer reste la référence */ }
    const el = document.getElementById("autoSaveFlash");
    if (!el) return;
    el.textContent = saved ? "● Brouillon enregistré à " + new Date().toLocaleTimeString("fr-FR") : "● Saisie en cours — pensez à Enregistrer";
    el.style.color = T.emerald;
    setTimeout(()=>{ if(el) { el.textContent = "Un formulaire par village, conforme au FORMULAIRE_VILLAGE.xlsx"; el.style.color = T.inkSoft; } }, 1400);
  }, 700);
}

/** v0.11.1 : une saisie est-elle en cours ? (bloque les re-rendus destructifs) */
function isEditing(){
  return STATE.active === "form"
    || (typeof RT_EDIT !== "undefined" && !!RT_EDIT)
    || (typeof PROD_EDIT !== "undefined" && !!PROD_EDIT)
    || !!document.getElementById("loginEmail");
}

function FormView(id){
  const draft = id==="new" ? blankVillage() : STATE.villages.find(v=>v.id===id) || blankVillage();
  // v0.11.1 : restauration d'un brouillon non enregistré (anti-perte de saisie).
  let draftRestored = false;
  try{
    const raw = localStorage.getItem("fbms_form_draft");
    if (raw){
      const d = JSON.parse(raw);
      if (d && d._draftFor === id && d._draftAt && (!draft.updatedAt || d._draftAt > draft.updatedAt)){
        const keepPhotos = draft.photos, keepId = draft.id;
        Object.assign(draft, d);
        draft.photos = keepPhotos; // le brouillon ne stocke pas les photos
        draft.id = keepId;
        delete draft._draftFor; delete draft._draftAt;
        draftRestored = true;
      }
    }
  }catch(e){ /* brouillon illisible : ignoré */ }
  const score = scoreOf(draft);
  const deps = (REGIONS.find(r=>r.region===draft.s1.region)?.departements) || [];

  let html = '<div class="p-6" id="recensement-form" oninput="flashAutoSave()">';
  html += '<div class="flex items-start justify-between mb-4 gap-4">'
    + '<div><h1 class="ff-display text-xl font-bold" style="color:'+T.ink+'">Fiche de recensement village</h1>'
    + '<p id="autoSaveFlash" class="ff-body text-sm" style="color:'+(draftRestored ? T.orange : T.inkSoft)+'">'
    + (draftRestored ? '⚠ Brouillon non enregistré restauré — cliquez « Enregistrer la fiche » pour le conserver.' : 'Un formulaire par village, conforme au FORMULAIRE_VILLAGE.xlsx')
    + '</p></div>'
    + '<div id="scoreBadgeTop" class="flex-shrink-0">'+scoreCompassSVG(score,48)+'</div></div>';

  // v0.9 : statut de la fiche — options selon le rôle, revérifié côté serveur.
  const stAllowed = statutsAutorises();
  const stCurrent = statutOf(draft);
  const stOptions = stAllowed.includes(stCurrent) ? stAllowed : [stCurrent].concat(stAllowed);
  html += '<div class="flex items-center gap-2 mb-3 max-w-3xl flex-wrap">'
    + '<span class="ff-body text-xs font-medium" style="color:'+T.inkSoft+'">Statut de la fiche :</span>'
    + '<select data-path="statut" class="ff-body text-xs rounded-lg px-2.5 py-2 outline-none" style="'+inputStyleAttr()+'">'
    + stOptions.map(s=>'<option '+(s===stCurrent?'selected':'')+(stAllowed.includes(s)?'':' disabled')+'>'+s+'</option>').join('')
    + '</select>'
    + statutPillHTML(stCurrent)
    + '</div>';

  html += '<div class="space-y-3 max-w-3xl">';

  // Section 1
  html += sectionWrap("sec1","Section 1 · Identification du village","map-pin",true,
    '<div class="grid grid-cols-2 gap-3">'

function swotColHTML(title, items, color, iconName){
  let html = '<div class="rounded-lg p-3" style="background-color:'+color+'0D;border:1px solid '+color+'33">'
    + '<div class="flex items-center gap-1.5 mb-2">'+icon(iconName,'w-3.5 h-3.5')+'<span class="ff-body text-xs font-bold" style="color:'+color+'">'+title+'</span></div>';
  if (items.length===0) html += '<p class="ff-body text-xs" style="color:'+T.inkSoft+'">—</p>';
  else html += '<ul class="space-y-1">' + items.map(it=>'<li class="ff-body text-xs" style="color:'+T.ink+'">• '+it+'</li>').join('') + '</ul>';
  html += '</div>';
  return html;
}

   ========================================================================== */
async function init(){
  // Étape 1 : restauration de la session conservée AVANT le premier rendu,
  // pour que la topbar affiche immédiatement l'utilisateur connecté.
  AUTH.restore();
  if (AUTH.isConnected() && AUTH.session.role) STATE.role = AUTH.session.role;

  // Étape 0 : ouverture de la base locale IndexedDB avant tout rendu.
  // En cas d'échec (navigation privée stricte…), bascule mémoire volatile
  // pour que l'application reste utilisable.
  try{
    if (typeof ADAPTER.init === "function") await ADAPTER.init();
  } catch(e){
    console.error("[FBMS] Échec d'ouverture IndexedDB — bascule en mémoire volatile.", e);
    ADAPTER = new InMemoryAdapter([]); // bascule effective : l'app reste utilisable, données non persistées
    RT_ADAPTER = new InMemoryAdapter([]); // v0.10 : même bascule pour la base RT
    PROD_ADAPTER = new InMemoryAdapter([]); // v0.11 : même bascule pour les producteurs
  }
  STATE.villages = await ADAPTER.list();
  try{ STATE.rt = await RT_ADAPTER.list(); } catch(e){ STATE.rt = []; } // v0.10
  try{ STATE.producteurs = await PROD_ADAPTER.list(); } catch(e){ STATE.producteurs = []; } // v0.11
  buildSidebar();
  buildTopbar();
  renderContent();

  // Étape 1 : revalidation de la session en arrière-plan (non bloquante).
  // Hors ligne, la session locale est conservée ; si le serveur la refuse,
  // la topbar repasse en mode déconnecté.
  if (AUTH.isConnected() && AUTH.isConfigured()){
    AUTH.validate().then(valid=>{
      buildTopbar();
      if (!valid && STATE.active==="admin") renderContent();
      // Étape 2 : synchronisation silencieuse au démarrage quand la session est valide.
      if (valid) syncNow(true);
    });
  }

  // Étape 4 : reprise automatique au retour du réseau + signal hors ligne.
  window.addEventListener("online", ()=>{
    setSyncStatus("Connexion rétablie — synchronisation…", T.inkSoft);
    if (AUTH.isConnected()) syncNow(true);
  });
  window.addEventListener("offline", ()=>{
    setSyncStatus("Hors ligne — enregistrement local uniquement", T.orange);
  });
  // Étape 4 : synchronisation automatique périodique (débrayable dans Administration).
  startAutoSync();

  // PWA : enregistrement du service worker — uniquement en HTTPS (hébergé).
  // Sans effet quand le fichier est ouvert localement.
  if ("serviceWorker" in navigator && location.protocol === "https:"){
    navigator.serviceWorker.register("./sw.js")
      .catch(e=>console.warn("[FBMS] Service worker non enregistré :", e.message));
  }
}
init();
</script>
</body>
</html>
