<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FBMS Cartographie</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>html,body{margin:0;height:100%;font-family:Arial;color:#132A22}body{display:flex;flex-direction:column;background:#F7F5EF}.top{height:56px;background:#053B23;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 14px}.top b{font-size:14px}.btn{border:0;border-radius:8px;background:#1F5B3F;color:white;padding:8px 10px;font-weight:800;cursor:pointer}.ghost{background:white;color:#1F5B3F}.body{flex:1;display:flex;min-height:0}.side{width:285px;background:white;border-right:1px solid #E4E0D5;padding:12px;overflow:auto}.map{flex:1}.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}.kpi div{background:#F1F9EF;border:1px solid #E4E0D5;border-radius:8px;padding:7px}.kpi small{display:block;font-size:9px;color:#4B5A52;font-weight:900;text-transform:uppercase}.kpi b{color:#053B23}label{display:block;font-size:11px;color:#4B5A52;font-weight:900;text-transform:uppercase;margin:10px 0 5px}select,input{width:100%;box-sizing:border-box;border:1px solid #E4E0D5;border-radius:8px;padding:8px;margin-bottom:7px}.toggle{display:flex;justify-content:space-between;align-items:center;border:1px solid #E4E0D5;border-radius:8px;padding:8px;margin-bottom:7px;font-weight:800;font-size:13px;cursor:pointer}.toggle.on{background:#053B23;color:white}.vlabel{background:rgba(255,255,255,.96);border:1px solid #d7d2c6;border-radius:6px;padding:2px 6px;font-size:11px;font-weight:900;color:#132A22;box-shadow:0 2px 5px #0002;white-space:nowrap;pointer-events:none}.clabel{background:rgba(5,59,35,.95);color:white;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:900;box-shadow:0 2px 7px #0004;white-space:nowrap;pointer-events:none}.leaflet-label-pane{z-index:760!important;pointer-events:none}.legend{font-size:11px;color:#4B5A52;line-height:1.7}.modal{position:fixed;inset:0;background:#053b2370;display:none;align-items:center;justify-content:center;z-index:5000}.modal.open{display:flex}.dlg{background:white;border-radius:16px;max-width:360px;width:90%;overflow:hidden}.dlg h2{margin:0;background:#053B23;color:white;padding:15px}.dlg .bd{padding:15px}.err{display:none;background:#fff1f1;color:#9b2c24;border-radius:8px;padding:8px;font-size:12px}@media(max-width:820px){.body{display:block}.side{width:100%;height:260px;border-right:0;border-bottom:1px solid #E4E0D5}.map{height:calc(100vh - 316px)}}</style></head><body><div class="top"><div><b>Cartographie de pilotage</b><br><small>FBMS Field Buying 2027</small></div><div><span id="who" style="font-size:12px;color:#A9CBB6">—</span> <a class="btn ghost" href="https://nwodobe.github.io/fbms/">Portail</a> <button id="loginBtn" class="btn" onclick="openLogin()">Se connecter</button></div></div><div class="body"><aside class="side"><div class="kpi"><div><small>Villages</small><b id="kVil">0</b></div><div><small>GPS</small><b id="kGeo">0</b></div><div><small>Clusters</small><b id="kClu">0</b></div></div><div id="tLabels" class="toggle on" onclick="toggleLabels()">Noms villages <span>ON</span></div><div id="tAxes" class="toggle on" onclick="toggleAxes()">Axes village-hub <span>ON</span></div><label>Region</label><select id="fRegion" onchange="render()"><option value="">Toutes</option></select><label>Departement</label><select id="fDep" onchange="render()"><option value="">Tous</option></select><label>Cluster</label><select id="fCluster" onchange="render()"><option value="">Tous</option></select><label>Recherche village</label><input id="search" oninput="render()" placeholder="Nom du village"><button class="btn" onclick="vueGlobale()">Vue globale</button><div class="legend"><br><b>Simulation affichee</b><br>Les noms sont dans un pane Leaflet dedie. Un clic sur la carte ne les supprime plus.</div></aside><div id="map" class="map"></div></div><div id="loginModal" class="modal"><div class="dlg"><h2>Connexion FBMS</h2><div class="bd"><label>Email</label><input id="email" type="email"><label>Mot de passe</label><input id="pass" type="password"><div id="err" class="err"></div><p><button class="btn" onclick="login()">Entrer</button> <button class="btn ghost" onclick="closeLogin()">Annuler</button></p></div></div></div><script>const SB=supabase.createClient('https://jmbdgpdthzpszfnddwzi.supabase.co','sb_publishable_Gu5j0VV4ymP-I9t3JriQXg_VlTJqV2d'),$=i=>document.getElementById(i);let S={map:null,villages:[],hubs:[],hubByKey:{},usine:null,layers:{v:null,h:null,a:null,u:null,l:null},showLabels:true,showAxes:true};const num=x=>{let n=parseFloat(String(x??'').replace(',','.'));return Number.isFinite(n)?n:null},km=x=>x==null?'—':(Math.round(x*10)/10).toLocaleString('fr-FR')+' km',mt=x=>x==null?'—':Math.round(x).toLocaleString('fr-FR');function key(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'')}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function hv(a,b,c,d){let R=6371,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),h=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function posV(v){let a=num(v.s1?.gpsLat),b=num(v.s1?.gpsLng);return a!=null&&b!=null?{lat:a,lng:b}:null}function posH(h){let a=num(h?.gps_lat),b=num(h?.gps_lng);return a!=null&&b!=null?{lat:a,lng:b}:null}function clus(v){let r=(v.s1?.cluster||'').trim(),h=S.hubByKey[key(r)];return h?h.nom:r.toUpperCase()}function hubPos(n){let h=S.hubs.find(x=>x.nom===n),p=posH(h);if(p)return p;let pts=S.villages.filter(v=>key(clus(v))===key(n)).map(posV).filter(Boolean);if(!pts.length)return null;return{lat:pts.reduce((s,p)=>s+p.lat,0)/pts.length,lng:pts.reduce((s,p)=>s+p.lng,0)/pts.length,prov:true}}async function load(){let r=await SB.from('parametres_calcul').select('cle,valeur');let P={};(r.data||[]).forEach(x=>P[x.cle]=Number(x.valeur));if(P.usine_lat&&P.usine_lng)S.usine={lat:P.usine_lat,lng:P.usine_lng};r=await SB.from('villages').select('data,statut').eq('deleted',false);S.villages=(r.data||[]).map(x=>Object.assign({},x.data,{_statut:x.statut})).filter(x=>x.s1);r=await SB.from('hubs_clusters').select('*').eq('deleted',false);S.hubs=r.data||[];S.hubByKey={};S.hubs.forEach(h=>S.hubByKey[h.hub_key||key(h.nom)]=h);filters();initMap();render()}function filters(){let regs=[...new Set(S.villages.map(v=>v.s1?.region).filter(Boolean))].sort(),deps=[...new Set(S.villages.map(v=>v.s1?.departement).filter(Boolean))].sort(),cs=[...new Set(S.villages.map(clus).filter(Boolean))].sort();$('fRegion').innerHTML='<option value="">Toutes</option>'+regs.map(x=>'<option>'+esc(x)+'</option>').join('');$('fDep').innerHTML='<option value="">Tous</option>'+deps.map(x=>'<option>'+esc(x)+'</option>').join('');$('fCluster').innerHTML='<option value="">Tous</option>'+cs.map(x=>'<option>'+esc(x)+'</option>').join('')}function initMap(){if(S.map)return;S.map=L.map('map').setView(S.usine?[S.usine.lat,S.usine.lng]:[7.6,-5.3],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(S.map);S.map.createPane('labels');S.map.getPane('labels').className+=' leaflet-label-pane';['a','u','h','v','l'].forEach(k=>S.layers[k]=L.layerGroup().addTo(S.map));['click','zoomend','moveend','popupopen','popupclose'].forEach(ev=>S.map.on(ev,()=>setTimeout(keepLabels,30)))}function keepLabels(){if(S.layers.l&&S.showLabels){S.map.getPane('labels').style.zIndex=760;S.layers.l.eachLayer(x=>x.setZIndexOffset&&x.setZIndexOffset(10000))}}function label(txt,lat,lng,typ){if(!S.showLabels)return;let html='<div class="'+(typ==='c'?'clabel':'vlabel')+'">'+esc(txt)+'</div>',ic=L.divIcon({className:'',html,iconSize:null,iconAnchor:typ==='c'?[-10,18]:[-7,-7]});L.marker([lat,lng],{icon:ic,pane:'labels',interactive:false,zIndexOffset:10000}).addTo(S.layers.l)}function filtered(){let fr=$('fRegion').value,fd=$('fDep').value,fc=$('fCluster').value,q=$('search').value.toLowerCase();return S.villages.filter(v=>(!fr||v.s1?.region===fr)&&(!fd||v.s1?.departement===fd)&&(!fc||clus(v)===fc)&&(!q||(v.s1?.village||'').toLowerCase().includes(q)))}function render(){Object.values(S.layers).forEach(g=>g.clearLayers());let vs=filtered(),geo=vs.map(posV).filter(Boolean).length,cs=[...new Set(vs.map(clus).filter(Boolean))],bounds=[];$('kVil').textContent=vs.length;$('kGeo').textContent=geo;$('kClu').textContent=cs.length;if(S.usine)L.marker([S.usine.lat,S.usine.lng]).addTo(S.layers.u).bindPopup('<b>Usine ANAGROCI Yamoussoukro</b>');cs.forEach(c=>{let p=hubPos(c);if(!p)return;let hvill=S.villages.filter(v=>key(clus(v))===key(c)),pot=0;hvill.forEach(v=>pot+=num(v.s3?.potentielMT)||0);L.circleMarker([p.lat,p.lng],{radius:13,color:'#fff',weight:3,fillColor:'#053B23',fillOpacity:.95}).addTo(S.layers.h).bindPopup('<b>'+esc(c)+'</b><br>Villages: '+hvill.length+'<br>Potentiel: '+mt(pot)+' MT');label(c,p.lat,p.lng,'c');bounds.push([p.lat,p.lng]);if(S.usine)L.polyline([[p.lat,p.lng],[S.usine.lat,S.usine.lng]],{color:'#EE9E00',weight:3,dashArray:'8 7'}).addTo(S.layers.a)});vs.forEach(v=>{let p=posV(v),c=clus(v),hp=hubPos(c),nom=v.s1?.village||'Village',pot=num(v.s3?.potentielMT)||0;if(!p)return;L.circleMarker([p.lat,p.lng],{radius:7,color:'#fff',weight:2,fillColor:pot>=500?'#053B23':pot>=200?'#1F5B3F':'#8DC556',fillOpacity:.95}).addTo(S.layers.v).bindPopup('<b>'+esc(nom)+'</b><br>Cluster: '+esc(c)+'<br>Potentiel: '+mt(pot)+' MT');label(nom,p.lat,p.lng,'v');bounds.push([p.lat,p.lng]);if(S.showAxes&&hp)L.polyline([[p.lat,p.lng],[hp.lat,hp.lng]],{color:'#1d6fa5',weight:2,dashArray:'7 6'}).addTo(S.layers.a)});keepLabels();if(bounds.length)try{S.map.fitBounds(bounds,{padding:[35,35],maxZoom:12})}catch(e){}}function toggleLabels(){S.showLabels=!S.showLabels;$('tLabels').classList.toggle('on',S.showLabels);render()}function toggleAxes(){S.showAxes=!S.showAxes;$('tAxes').classList.toggle('on',S.showAxes);render()}function vueGlobale(){$('fRegion').value='';$('fDep').value='';$('fCluster').value='';$('search').value='';render()}function openLogin(){$('loginModal').classList.add('open')}function closeLogin(){$('loginModal').classList.remove('open')}async function login(){let email=$('email').value.trim().toLowerCase(),password=$('pass').value,er=$('err');let r=await SB.auth.signInWithPassword({email,password});if(r.error){er.style.display='block';er.textContent=r.error.message;return}apply(r.data.session);closeLogin()}async function apply(s){let r=await SB.from('profils').select('nom,role,actif').eq('user_id',s.user.id).single();if(r.data&&r.data.actif){$('who').textContent=(r.data.nom||s.user.email)+' · '+r.data.role;$('loginBtn').style.display='none'}await load()}(async()=>{let r=await SB.auth.getSession();if(r.data.session)apply(r.data.session)})();</script></body></html>
