<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carte FBMS</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script defer src="../shared/auth-gate.js" data-module="carte"></script><style>html,body{margin:0;height:100%;font-family:Arial;color:#132a22}body{display:flex;flex-direction:column;background:#f7f5ef}.top{min-height:56px;background:#053b23;color:white;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-wrap:wrap;row-gap:8px}.top .btn{padding:7px 9px;font-size:12px}.btn{background:#fff;color:#053b23;border:0;border-radius:8px;padding:8px 10px;text-decoration:none;font-weight:800;cursor:pointer}.body{flex:1;display:flex;min-height:0}.side{width:310px;background:#fff;border-right:1px solid #ddd;padding:12px;overflow:auto}.map{flex:1}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.k{background:#f1f9ef;border:1px solid #ddd;border-radius:10px;padding:9px}.k small{display:block;color:#4b5a52;font-size:10px;font-weight:900}.k b{display:block;color:#053b23;font-size:18px}select,input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:8px;padding:8px;margin:6px 0}.tog{display:flex;justify-content:space-between;border:1px solid #ddd;border-radius:8px;padding:8px;margin:6px 0;font-weight:800;cursor:pointer}.tog.on{background:#053b23;color:white}.vlabel{background:white;border:1px solid #bbb;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:bold;white-space:nowrap;box-shadow:0 2px 5px #0002}.clabel{background:#053b23;color:white;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:bold;white-space:nowrap}.rlabel{background:white;border:1px solid #ddd;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:bold;white-space:nowrap}.leaflet-label-pane{z-index:760!important;pointer-events:none}.msg{font-size:12px;background:#fff8e8;border:1px solid #ead9a6;border-radius:8px;padding:8px;margin-top:8px}.ok{background:#f1f9ef;border-color:#bfe3b6}@media(max-width:820px){.top{align-items:flex-start}.top>div:last-child{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.body{display:block}.side{width:100%;height:auto;max-height:42vh;overflow:auto}.map{height:60vh;min-height:320px}}</style><link rel="stylesheet" href="../shared/pjs-theme.css"><script defer src="../shared/uppercase.js"></script></head><body><div class="top"><div style="display:flex;align-items:center"><span class="pjs-chip"><img src="../assets/logo-pjs-mark.png" alt="PJS"></span><span><b>Cartographie FBMS</b></span></div><div><a class="btn" href="https://nwodobe.github.io/fbms/">Portail</a> <a class="btn" href="audit_distances.html">Audit</a> <a class="btn" href="https://nwodobe.github.io/fbms/logistique/alis_fbms.html">ALIS</a> <span id="anagroci-userslot" style="margin-left:4px"></span></div></div><div class="body"><aside class="side"><div class="kpis"><div class="k"><small>Villages</small><b id="kv">0</b></div><div class="k"><small>Clusters</small><b id="kc">0</b></div><div class="k"><small>GPS</small><b id="kg">0</b></div><div class="k"><small>Distance validee</small><b id="kdv">0</b></div></div><select id="fc" onchange="draw()"><option value="">Tous clusters</option></select><input id="q" oninput="draw()" placeholder="Rechercher village"><div id="tn" class="tog on" onclick="tog('names')">Noms villages <span>ON</span></div><div id="ta" class="tog on" onclick="tog('axes')">Axes village-hub <span>ON</span></div><div id="tr" class="tog on" onclick="tog('routes')">Distances axes <span>ON</span></div><p><button class="btn" onclick="load(true)">Actualiser maintenant</button></p><div id="msg" class="msg">Chargement...</div></aside><div id="map" class="map"></div></div><script>const SB=supabase.createClient('https://jmbdgpdthzpszfnddwzi.supabase.co','sb_publishable_Gu5j0VV4ymP-I9t3JriQXg_VlTJqV2d');const $=i=>document.getElementById(i);let map=L.map('map').setView([7.52,-5.08],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'OpenStreetMap'}).addTo(map);map.createPane('labels');map.getPane('labels').className+=' leaflet-label-pane';let G={},V=[],H=[],HK={},U={lat:6.741972,lng:-5.345750},show={names:true,axes:true,routes:true},first=true;['a','p','l','r','u'].forEach(k=>G[k]=L.layerGroup().addTo(map));function num(x){let n=parseFloat(String(x??'').replace(',','.'));return Number.isFinite(n)?n:null}function km(x){return x==null?'--':(Math.round(x*10)/10).toLocaleString('fr-FR')+' km'}function key(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'')}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function hv(a,b,c,d){let R=6371,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),h=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function vp(v){let a=num(v.data?.s1?.gpsLat),b=num(v.data?.s1?.gpsLng);return a!=null&&b!=null?{lat:a,lng:b}:null}function hp(h){let a=num(h?.gps_lat),b=num(h?.gps_lng);return a!=null&&b!=null?{lat:a,lng:b}:null}function cl(v){let raw=(v.data?.s1?.cluster||'').trim(),h=HK[key(raw)];return h?h.nom:raw.toUpperCase()}function vh(c){return V.filter(v=>key(cl(v))===key(c))}function cp(c){let h=H.find(x=>key(x.nom)===key(c)),p=hp(h);if(p)return p;let pts=vh(c).map(vp).filter(Boolean);if(!pts.length)return null;return{lat:pts.reduce((s,p)=>s+p.lat,0)/pts.length,lng:pts.reduce((s,p)=>s+p.lng,0)/pts.length}}function dist(v,p,h){let r=num(v.data?.s1?.distanceHubRoutiere);if(r!=null)return{d:r,ok:true};let s=num(v.data?.s1?.distanceHub);if(s!=null)return{d:s,ok:false};return p&&h?{d:hv(p.lat,p.lng,h.lat,h.lng),ok:false}:{d:null,ok:false}}function lab(t,lat,lng,cls){if(!show.names)return;let ic=L.divIcon({className:'',html:'<div class="'+cls+'">'+esc(t)+'</div>',iconSize:null,iconAnchor:cls==='clabel'?[-10,18]:[-7,-7]});L.marker([lat,lng],{icon:ic,pane:'labels',interactive:false,zIndexOffset:10000}).addTo(G.l)}function rlab(t,a,b){if(!show.routes||t==='--')return;let ic=L.divIcon({className:'',html:'<div class="rlabel">'+esc(t)+'</div>',iconSize:null,iconAnchor:[-7,-7]});L.marker([(a.lat+b.lat)/2,(a.lng+b.lng)/2],{icon:ic,pane:'labels',interactive:false,zIndexOffset:9000}).addTo(G.r)}async function load(manual){try{let r=await SB.from('parametres_calcul').select('cle,valeur');(r.data||[]).forEach(x=>{if(x.cle==='usine_lat')U.lat=Number(x.valeur);if(x.cle==='usine_lng')U.lng=Number(x.valeur)});r=await SB.from('villages').select('id,data,statut,updated_at').eq('deleted',false);V=r.data||[];r=await SB.from('hubs_clusters').select('*').eq('deleted',false);H=r.data||[];HK={};H.forEach(h=>HK[h.hub_key||key(h.nom)]=h);fill();draw();$('msg').className='msg ok';$('msg').textContent='Carte actualisee: '+new Date().toLocaleTimeString('fr-FR')+'. Les distances validees dans Audit remontent ici.'}catch(e){$('msg').textContent='Erreur: '+e.message}}function fill(){let current=$('fc').value,cs=[...new Set(V.map(cl).filter(Boolean))].sort();$('fc').innerHTML='<option value="">Tous clusters</option>'+cs.map(c=>'<option>'+esc(c)+'</option>').join('');$('fc').value=current}function filt(){let fc=$('fc').value,q=$('q').value.toLowerCase();return V.filter(v=>(!fc||cl(v)===fc)&&(!q||(v.data?.s1?.village||'').toLowerCase().includes(q)))}function draw(){Object.values(G).forEach(g=>g.clearLayers());let vs=filt(),cs=[...new Set(vs.map(cl).filter(Boolean))],bounds=[],valid=0;$('kv').textContent=vs.length;$('kc').textContent=cs.length;$('kg').textContent=vs.map(vp).filter(Boolean).length;L.marker([U.lat,U.lng]).addTo(G.u).bindPopup('Usine Yamoussoukro');cs.forEach(c=>{let p=cp(c);if(!p)return;L.circleMarker([p.lat,p.lng],{radius:14,color:'#fff',weight:3,fillColor:'#053B23',fillOpacity:.95}).addTo(G.p).bindPopup('<b>'+esc(c)+'</b>');lab(c,p.lat,p.lng,'clabel');bounds.push([p.lat,p.lng]);L.polyline([[p.lat,p.lng],[U.lat,U.lng]],{color:'#EE9E00',weight:3,dashArray:'8 7'}).addTo(G.a)});vs.forEach(v=>{let p=vp(v),c=cl(v),h=cp(c),name=v.data?.s1?.village||'Village';if(!p)return;let d=dist(v,p,h);if(d.ok)valid++;L.circleMarker([p.lat,p.lng],{radius:7,color:'#fff',weight:2,fillColor:d.ok?'#1F9D6E':'#1d6fa5',fillOpacity:.95}).addTo(G.p).bindPopup('<b>'+esc(name)+'</b><br>Cluster: '+esc(c)+'<br>Distance: '+km(d.d)+(d.ok?' validee':' non validee'));lab(name,p.lat,p.lng,'vlabel');bounds.push([p.lat,p.lng]);if(show.axes&&h){L.polyline([[p.lat,p.lng],[h.lat,h.lng]],{color:d.ok?'#1F9D6E':'#1d6fa5',weight:d.ok?4:2,dashArray:d.ok?null:'7 6'}).addTo(G.a);rlab(km(d.d),p,h)}});$('kdv').textContent=valid;keep();if(first&&bounds.length){first=false;map.fitBounds(bounds,{padding:[35,35],maxZoom:12})}}function keep(){map.getPane('labels').style.zIndex=760;G.l.eachLayer(x=>x.setZIndexOffset&&x.setZIndexOffset(10000));G.r.eachLayer(x=>x.setZIndexOffset&&x.setZIndexOffset(9000))}function tog(k){show[k]=!show[k];let id=k==='names'?'tn':k==='axes'?'ta':'tr';$(id).classList.toggle('on',show[k]);$(id).querySelector('span').textContent=show[k]?'ON':'OFF';draw()}['click','zoomend','moveend','popupopen','popupclose'].forEach(e=>map.on(e,()=>setTimeout(keep,20)));load();setInterval(()=>load(false),20000);try{SB.channel('fbms-map-live').on('postgres_changes',{event:'*',schema:'public',table:'villages'},()=>load(false)).on('postgres_changes',{event:'*',schema:'public',table:'hubs_clusters'},()=>load(false)).subscribe()}catch(e){}</script></body></html>
