<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Audit distances FBMS</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script defer src="../shared/auth-gate.js" data-module="audit"></script><style>body{font-family:Arial;margin:0;background:#f7f5ef;color:#132a22}header{background:#053b23;color:white;padding:14px 18px;display:flex;justify-content:space-between;gap:10px}a,.btn{background:#1f5b3f;color:white;border:0;border-radius:8px;padding:8px 10px;text-decoration:none;font-weight:bold;cursor:pointer}.ghost{background:white;color:#053b23}.wrap{padding:16px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:320px 1fr;gap:14px}.card{background:white;border:1px solid #e4e0d5;border-radius:12px;padding:14px}label{display:block;font-size:11px;font-weight:bold;text-transform:uppercase;color:#4b5a52;margin-top:10px}input,select{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ddd;border-radius:7px;margin-top:4px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.k{background:#f1f9ef;border:1px solid #e4e0d5;border-radius:10px;padding:9px}.k small{display:block;color:#4b5a52;font-size:10px;font-weight:bold}.k b{font-size:20px;color:#053b23}table{width:100%;border-collapse:collapse;background:white}th{background:#053b23;color:white;font-size:11px;text-align:left;padding:8px;position:sticky;top:0}td{border-top:1px solid #eee;padding:8px;font-size:12px}.ok{background:#e0f3de;color:#053b23}.warn{background:#fff4df;color:#8a5b00}.bad{background:#fdeceb;color:#a5372c}.pill{border-radius:999px;padding:4px 8px;font-weight:bold;font-size:11px}.msg{font-size:12px;background:#fff8e8;border:1px solid #ead9a6;border-radius:8px;padding:8px;margin-top:10px}.good{background:#f1f9ef;border-color:#bfe3b6}header{flex-wrap:wrap;align-items:center}header>div:last-child{display:flex;flex-wrap:wrap;gap:6px;align-items:center}section{overflow-x:auto}table{min-width:860px}th:last-child{position:sticky;right:0;background:#053b23;z-index:3}td:last-child{position:sticky;right:0;background:#fff;z-index:2}@media(max-width:850px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}</style><link rel="stylesheet" href="../shared/pjs-theme.css"><script defer src="../shared/uppercase.js"></script></head><body><header><div style="display:flex;align-items:center"><span class="pjs-chip"><img src="../assets/logo-pjs-mark.png" alt="PJS"></span><span><b>Audit distances FBMS</b><br><small>GPS village / GPS hub / distance routiere</small></span></div><div><a class="ghost" href="https://nwodobe.github.io/fbms/">Portail</a> <a class="ghost" href="fbms_carte.html">Carte</a> <a class="ghost" href="fbms_hubs.html">Hubs</a> <span id="anagroci-userslot" style="margin-left:4px"></span></div></header><main class="wrap"><div class="kpis"><div class="k"><small>Villages</small><b id="kv">0</b></div><div class="k"><small>OK</small><b id="ko">0</b></div><div class="k"><small>A controler</small><b id="kw">0</b></div><div class="k"><small>Anomalies</small><b id="kb">0</b></div></div><div class="grid"><section class="card"><label>Hub</label><select id="hub" onchange="pickHub()"></select><label>Latitude hub</label><input id="lat" type="number" step="0.000001"><label>Longitude hub</label><input id="lng" type="number" step="0.000001"><p><button class="btn" onclick="saveHub()">Enregistrer GPS hub</button></p><label>Recherche village</label><input id="q" oninput="render()"><label>Seuil anomalie</label><select id="seuil" onchange="render()"><option value="5">5 km</option><option value="10">10 km</option><option value="15" selected>15 km</option></select><p><button class="btn" onclick="load()">Actualiser</button></p><div id="msg" class="msg">Chargement...</div></section><section><table><thead><tr><th>Village</th><th>GPS km</th><th>Saisie</th><th>Validee</th><th>Ecart</th><th>Ratio</th><th>Statut</th><th>Action</th></tr></thead><tbody id="rows"></tbody></table></section></div></main><script>const SB=supabase.createClient('https://jmbdgpdthzpszfnddwzi.supabase.co','sb_publishable_Gu5j0VV4ymP-I9t3JriQXg_VlTJqV2d'),$=i=>document.getElementById(i);let V=[],H=[],HK={},sel='';function n(x){let v=parseFloat(String(x??'').replace(',','.'));return isFinite(v)?v:null}function km(x){return x==null?'--':(Math.round(x*100)/100).toLocaleString('fr-FR')}function key(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'')}function hv(a,b,c,d){let R=6371,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),h=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function cluster(v){let raw=(v.data.s1?.cluster||'').trim(),h=HK[key(raw)];return h?h.nom:raw.toUpperCase()}function vg(v){let a=n(v.data.s1?.gpsLat),b=n(v.data.s1?.gpsLng);return a!=null&&b!=null?{a,b}:null}async function load(){let r=await SB.from('villages').select('id,data,statut').eq('deleted',false);V=(r.data||[]).filter(x=>x.data&&x.data.s1);r=await SB.from('hubs_clusters').select('*').eq('deleted',false).order('nom');H=r.data||[];HK={};H.forEach(h=>HK[h.hub_key||key(h.nom)]=h);$('hub').innerHTML=H.map(h=>'<option>'+esc(h.nom)+'</option>').join('');if(!sel&&H[0])sel=H[0].nom;$('hub').value=sel;pickHub(false);$('msg').className='msg good';$('msg').textContent='Charge: '+V.length+' villages, '+H.length+' hubs.'}function pickHub(doRender=true){sel=$('hub').value;let h=H.find(x=>x.nom===sel);$('lat').value=h?.gps_lat??'';$('lng').value=h?.gps_lng??'';if(doRender)render()}function dataRows(){let la=n($('lat').value),ln=n($('lng').value),q=$('q').value.toLowerCase(),seuil=n($('seuil').value)||15;return V.filter(v=>cluster(v)===sel).filter(v=>!q||(v.data.s1?.village||'').toLowerCase().includes(q)).map(v=>{let g=vg(v),gps=(g&&la!=null&&ln!=null)?hv(g.a,g.b,la,ln):null,sa=n(v.data.s1?.distanceHub),ro=n(v.data.s1?.distanceHubRoutiere),ref=ro??sa,ec=(gps!=null&&ref!=null)?Math.abs(ref-gps):null,ratio=(gps&&ref)?ref/gps:null,st='GPS manquant',cls='bad';if(gps!=null&&ref==null){st='Distance manquante';cls='warn'}else if(ec!=null&&ec<=5){st='OK';cls='ok'}else if(ec!=null&&ec<=seuil){st='A controler';cls='warn'}else if(ec!=null){st='Anomalie';cls='bad'}return{v,gps,sa,ro,ec,ratio,st,cls}})}function render(){let R=dataRows(),ok=R.filter(r=>r.cls==='ok').length,w=R.filter(r=>r.cls==='warn').length,b=R.filter(r=>r.cls==='bad').length;$('kv').textContent=R.length;$('ko').textContent=ok;$('kw').textContent=w;$('kb').textContent=b;$('rows').innerHTML=R.map(r=>'<tr><td><b>'+esc(r.v.data.s1?.village||'')+'</b></td><td>'+km(r.gps)+'</td><td>'+km(r.sa)+'</td><td>'+km(r.ro)+'</td><td>'+km(r.ec)+'</td><td>'+(r.ratio?Math.round(r.ratio*100)/100:'--')+'</td><td><span class="pill '+r.cls+'">'+r.st+'</span></td><td><button class="btn" onclick="valide(\''+r.v.id+'\')">Valider</button></td></tr>').join('')}async function saveHub(){let h=H.find(x=>x.nom===sel),la=n($('lat').value),ln=n($('lng').value);if(!h||la==null||ln==null)return alert('GPS hub invalide');let r=await SB.from('hubs_clusters').update({gps_lat:la,gps_lng:ln,hub_key:key(h.nom),updated_at:new Date().toISOString(),statut:h.statut==='À géolocaliser'?'GPS renseigné':h.statut}).eq('id_hub',h.id_hub);if(r.error)return alert(r.error.message);await load();$('msg').className='msg good';$('msg').textContent='GPS hub enregistre.'}async function valide(id){let R=dataRows(),r=R.find(x=>x.v.id===id);if(!r)return;let val=prompt('Distance routiere validee en km',r.sa??r.gps??'');let d=n(val);if(d==null)return;let data=JSON.parse(JSON.stringify(r.v.data));data.s1.distanceHubRoutiere=d;let res=await SB.from('villages').update({data,updated_at:new Date().toISOString()}).eq('id',id);if(res.error)return alert(res.error.message);await load();$('msg').className='msg good';$('msg').textContent='Distance validee pour '+(data.s1.village||'village')+'.'}load();</script></body></html>
