<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#053B23">
<title>RCN TRACE · ANAGROCI</title>
<link rel="icon" href="../icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="../shared/auth-gate.js" data-module="rcntrace"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#053B23;--deep:#0A5531;--pine:#00712C;--emerald:#008F37;--lime:#8DC556;--sprout:#B6DC8E;
    --pale:#E0F3DE;--mist:#F1F9EF;--orange:#EE9E00;--orange-soft:#F5B229;--orange-tint:#FDEFCE;
    --ink:#323131;--n700:#4F4E4E;--n500:#7A7878;--n300:#CFCECE;--n200:#E8E7E7;--n100:#F4F4F3;
    --white:#fff;--danger:#C0392B;--danger-tint:#FBE9E7;--on-dark:#CFE3D3;
    --fd:'Archivo','Helvetica Neue',Arial,sans-serif;--fb:'IBM Plex Sans','Helvetica Neue',Arial,sans-serif;--fm:'IBM Plex Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--fb);color:var(--ink);background:var(--mist);-webkit-font-smoothing:antialiased}
  a{color:var(--emerald);text-decoration:none}
  /* ---- Layout : sidebar + main ---- */
  .app{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
  .side{background:var(--forest);color:#eafff2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .brand{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.10)}
  .side .brand .chip{background:#fff;border-radius:7px;padding:4px 6px;display:inline-flex}
  .side .brand .chip img{height:26px;display:block}
  .side .brand b{font-family:var(--fd);font-size:15px;color:#fff;letter-spacing:.01em;display:block;line-height:1.1}
  .side .brand small{font-size:10px;color:var(--lime);letter-spacing:.16em;text-transform:uppercase}
  .side nav{padding:12px 10px;overflow-y:auto;flex:1}
  .side nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--on-dark);font-weight:600;font-size:14px;margin-bottom:2px;transition:background .15s,color .15s}
  .side nav a .ni{width:22px;text-align:center;font-size:12px;font-family:var(--fm);opacity:.85}
  .side nav a:hover{background:rgba(255,255,255,.07);color:#fff}
  .side nav a.on{background:var(--emerald);color:#fff}
  .side nav a.on .ni{opacity:1}
  .side nav .nav-sec{margin:10px 12px 6px;color:#8fb79c;font-size:10px;font-weight:800;letter-spacing:.11em;text-transform:uppercase}
  .side nav .nav-back{color:#bfe08f;font-weight:700;font-size:12.5px;margin-bottom:6px}
  .side nav .nav-back:hover{background:rgba(255,255,255,.07)}
  .side nav a.soon{opacity:.62}
  .side nav a.soon em{margin-left:auto;font-style:normal;font-size:9px;font-weight:800;letter-spacing:.04em;color:#8fb79c;text-transform:uppercase}
  .side .who{padding:12px 16px;border-top:1px solid rgba(255,255,255,.10);font-size:12px}
  .side .who b{color:#fff;display:block;font-size:13px}
  .side .who span{color:var(--lime);text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:700}
  .side .who a{color:var(--on-dark);font-size:11px;display:inline-block;margin-top:8px}
  /* ---- Topbar ---- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{background:#fff;border-bottom:1px solid var(--n200);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:20}
  .topbar .crumb{font-family:var(--fd);font-weight:700;font-size:16px;color:var(--forest)}
  .topbar .crumb small{display:block;font-family:var(--fb);font-weight:500;font-size:12px;color:var(--n500);letter-spacing:0}
  .topbar .r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .net{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;border-radius:999px;padding:5px 11px;border:1px solid var(--n200);color:var(--n700)}
  .net .d{width:8px;height:8px;border-radius:50%}
  .net.on .d{background:var(--emerald)}.net.off .d{background:var(--orange)}
  .langbtn{border:1px solid var(--n200);background:#fff;border-radius:8px;font-weight:700;font-size:12px;padding:6px 10px;cursor:pointer;color:var(--n700)}
  .content{padding:32px 40px 72px;max-width:1180px;width:100%}
  /* ---- Composants ---- */
  .pagehead{margin:0 0 28px}
  .pagehead .eyebrow{display:block;font-family:var(--fb);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);margin:0 0 10px}
  .pagehead h1{font-family:var(--fd);font-weight:800;font-size:34px;line-height:1.12;color:var(--forest);margin:0 0 10px;letter-spacing:-.02em;text-wrap:pretty;max-width:30ch}
  /* Le sélecteur de langue partagé a déjà sa place (bouton EN/FR en haut à droite) :
     on neutralise sa variante flottante qui chevaucherait la barre latérale. */
  #anagroci-lang-toggle.float{display:none!important}
  .pagehead p{margin:0;color:var(--n500);font-size:15.5px;line-height:1.55;max-width:64ch}
  @media(max-width:640px){.content{padding:22px 18px 60px}.pagehead h1{font-size:26px}}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--n200);border-radius:16px;padding:18px 20px;box-shadow:0 2px 10px rgba(5,59,35,.05)}
  .kpi small{display:block;color:var(--n500);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .kpi b{font-family:var(--fm);font-size:30px;color:var(--forest);line-height:1.2;display:block;margin-top:4px}
  .kpi span{font-size:12px;color:var(--n500)}
  .kpi.warn b{color:var(--orange)} .kpi.danger b{color:var(--danger)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--n200);border-radius:16px;box-shadow:0 2px 8px rgba(5,59,35,.05);overflow:hidden}
  .card>h2{margin:0;padding:14px 18px;border-bottom:1px solid var(--n200);color:var(--forest);font-family:var(--fd);font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card .cbody{padding:16px 18px}
  .grid2{display:grid;grid-template-columns:1.35fr .9fr;gap:18px;align-items:start}
  .grid2.rev{grid-template-columns:.9fr 1.35fr}
  @media(max-width:900px){.grid2,.grid2.rev{grid-template-columns:1fr}}
  .shortcut{display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid var(--n200);border-radius:14px;padding:16px;cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease);text-align:left}
  .shortcut:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(5,59,35,.12)}
  .shortcut b{font-family:var(--fd);font-size:15px;color:var(--forest)}
  .shortcut span{font-size:13px;color:var(--n500)}
  .shortcut .cta{color:var(--emerald);font-weight:700;font-size:13px;margin-top:4px}
  /* portail */
  .portal-group{margin:26px 0 6px}
  .portal-group>h2{font-family:var(--fd);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--pine);margin:0 0 12px;display:flex;align-items:center;gap:10px}
  .portal-group>h2::after{content:"";flex:1;height:1px;background:var(--n200)}
  .portal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .sec-card{position:relative;display:flex;flex-direction:column;gap:8px;background:#fff;border:1px solid var(--n200);border-radius:16px;padding:18px 18px 16px;cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease),border-color .18s var(--ease);text-align:left;min-height:112px}
  .sec-card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(5,59,35,.13);border-color:var(--sprout)}
  .sec-card .ic{width:38px;height:38px;border-radius:11px;background:var(--pale);color:var(--pine);display:flex;align-items:center;justify-content:center;font-size:19px}
  .sec-card b{font-family:var(--fd);font-size:15.5px;color:var(--forest)}
  .sec-card span{font-size:12.5px;color:var(--n500);line-height:1.4}
  .sec-card .pill{position:absolute;top:14px;right:14px;font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;background:var(--orange-tint);color:var(--orange);font-family:var(--fm)}
  .sec-card .pill.q{background:var(--pale);color:var(--pine)}
  .portal-cta{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:linear-gradient(100deg,var(--forest),var(--pine));color:#eafff2;border-radius:16px;padding:16px 20px;margin-bottom:8px}
  .portal-cta b{font-family:var(--fd);font-size:15px;color:#fff}
  .portal-cta span{font-size:13px;color:#cdeede}
  .portal-cta button{background:#fff;color:var(--forest);border:0;border-radius:9px;font-weight:700;font-size:13px;padding:9px 14px;cursor:pointer}
  /* portail v2 (hero chaîne cajou) */
  .rp-hero{position:relative;overflow:hidden;color:#fff;margin:-32px -40px 26px;padding:44px 40px 30px;background:linear-gradient(120deg,var(--forest) 0%,#075735 68%,#0b7544 100%)}
  .rp-hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 18%,rgba(141,197,86,.18),transparent 34%),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:auto,46px 46px,46px 46px;pointer-events:none}
  .rp-in{position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:38px;align-items:center}
  .rp-eyebrow{display:flex;align-items:center;gap:9px;margin:0 0 13px;color:#bfe08f;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
  .rp-eyebrow:before{content:"";width:22px;height:2px;background:var(--lime)}
  .rp-hero h1{margin:0;color:#fff;font-family:var(--fd);font-weight:800;font-size:clamp(30px,3.6vw,46px);line-height:1.04;letter-spacing:-.03em;max-width:15ch}
  .rp-hero .lead{max-width:56ch;margin:16px 0 22px;color:#c7dbcf;font-size:15px;line-height:1.6}
  .rp-acts{display:flex;flex-wrap:wrap;gap:11px}
  .rp-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 17px;border:0;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .rp-btn.pri{color:var(--forest);background:var(--lime);box-shadow:0 9px 24px rgba(0,0,0,.16)}
  .rp-btn.gho{color:#fff;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16)}
  .rp-btn:hover{transform:translateY(-1px)}
  /* panneau activité (flux usine) */
  .rp-panel{position:relative;padding:22px 20px 18px;border:1px solid rgba(255,255,255,.14);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.035));box-shadow:inset 0 1px rgba(255,255,255,.14),0 26px 60px rgba(0,0,0,.2)}
  .rp-phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .rp-phead small{color:#a9c5b4;font-size:9px;letter-spacing:.13em;text-transform:uppercase}
  .rp-live{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:99px;color:#dff4d5;background:rgba(141,197,86,.14);font-size:9px;font-weight:800;text-transform:uppercase}
  .rp-live:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(141,197,86,.14);animation:rp-pulse 2s infinite}
  @keyframes rp-pulse{50%{box-shadow:0 0 0 7px rgba(141,197,86,0)}}
  .rp-chip{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px;padding:11px 13px;border:1px solid rgba(255,255,255,.12);border-radius:11px;background:rgba(2,36,23,.42)}
  .rp-chip small{display:block;color:#9fb9aa;font-size:8px;text-transform:uppercase;letter-spacing:.08em}
  .rp-chip strong{font-family:var(--fm);font-weight:600;font-size:12.5px;color:#fff}
  .rp-chip b{color:var(--lime);font-size:9px;font-weight:800}
  .rp-flowmini{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding-bottom:26px}
  .rp-flowmini:before{content:"";position:absolute;left:8%;right:8%;bottom:11px;height:5px;border-radius:99px;background:linear-gradient(90deg,var(--orange),var(--lime));opacity:.9}
  .rp-flowmini:after{content:"";position:absolute;left:8%;bottom:8px;width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.14);animation:rp-travel 4.4s linear infinite}
  @keyframes rp-travel{from{left:8%}to{left:86%}}
  .rp-node{position:relative;display:grid;justify-items:center;align-content:center;gap:7px;min-height:104px;padding:12px 6px;border:1px solid rgba(255,255,255,.1);border-radius:13px;background:rgba(255,255,255,.05);text-align:center}
  .rp-node .e{font-size:22px;line-height:1}
  .rp-node strong{font-family:var(--fd);font-weight:700;font-size:10px;color:#fff}
  .rp-node small{color:#9db4a6;font-size:8px;line-height:1.25}
  .rp-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .rp-kpis div{display:grid;gap:2px;padding:9px 10px;border-radius:10px;background:#fff;color:var(--ink)}
  .rp-kpis strong{color:var(--forest);font-family:var(--fd);font-weight:800;font-size:15px}
  .rp-kpis small{color:var(--n500);font-size:7.5px;text-transform:uppercase;letter-spacing:.05em}
  .rp-kpis div:last-child strong{color:var(--emerald)}
  /* bande chaîne 8 étapes */
  .rp-strip{display:grid;grid-template-columns:repeat(8,1fr);margin:0 0 30px;padding:15px 14px;color:#fff;background:rgba(5,59,35,.94);border-radius:14px}
  .rp-strip span{position:relative;display:grid;justify-items:center;gap:5px;color:#aecab8;font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;text-align:center}
  .rp-strip span:not(:last-child):after{content:"";position:absolute;top:12px;right:-12%;width:24%;border-top:1px dashed rgba(255,255,255,.3)}
  .rp-strip i{display:grid;place-items:center;width:26px;height:26px;border:1px solid rgba(255,255,255,.18);border-radius:50%;color:var(--lime);background:rgba(255,255,255,.07);font-style:normal;font-family:var(--fd);font-weight:700;font-size:9px}
  /* grille de modules (chaîne) */
  .rp-modules{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
  .rp-mod{position:relative;display:flex;flex-direction:column;min-height:232px;overflow:hidden;padding:20px;border:1px solid var(--n200);border-radius:18px;background:#fff;box-shadow:0 3px 12px rgba(6,60,39,.05);cursor:pointer;text-align:left;transition:transform .25s var(--ease),box-shadow .25s var(--ease),border-color .25s var(--ease)}
  .rp-mod:hover{transform:translateY(-6px);border-color:#afd1b7;box-shadow:0 18px 44px rgba(5,59,35,.13)}
  .rp-mod:after{content:"";position:absolute;right:-38px;top:-44px;width:128px;height:128px;border-radius:50%;background:var(--tint,#e4f3e5)}
  .rp-mtop{position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:space-between}
  .rp-micon{display:grid;place-items:center;width:48px;height:48px;border-radius:14px;background:var(--tint,#e4f3e5);font-size:24px}
  .rp-num{color:#a6b3ab;font-family:var(--fm);font-size:10px}
  .rp-mod h3{position:relative;z-index:2;margin:26px 0 6px;color:var(--forest);font-family:var(--fd);font-weight:700;font-size:16px}
  .rp-mod p{position:relative;z-index:2;margin:0;color:var(--n500);font-size:11.5px;line-height:1.5}
  .rp-mfoot{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:18px}
  .rp-stat{display:inline-flex;align-items:center;gap:6px;color:var(--emerald);font-size:9.5px;font-weight:700}
  .rp-stat:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--lime)}
  .rp-mod.soon .rp-stat{color:var(--orange)}.rp-mod.soon .rp-stat:before{background:var(--orange-soft)}
  .rp-go{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;color:#fff;background:var(--forest);font-size:15px;transition:.2s}
  .rp-mod:hover .rp-go{background:var(--emerald);transform:translateX(3px)}
  .rp-mod.orange{--tint:#fff1d4}.rp-mod.neutral{--tint:#eef1ef}
  .rp-insight{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:26px}
  .rp-ins{display:flex;align-items:center;gap:16px;padding:20px;border-radius:16px;background:#fff;border:1px solid var(--n200)}
  .rp-ins.dark{color:#fff;background:var(--forest);border:0}
  .rp-ins .ic{display:grid;place-items:center;flex:0 0 46px;height:46px;border-radius:13px;background:var(--lime);font-size:22px}
  .rp-ins strong{display:block;font-family:var(--fd);font-weight:700;font-size:14px}
  .rp-ins.dark strong{color:#fff}.rp-ins p{margin:4px 0 0;color:var(--n500);font-size:11px;line-height:1.5}.rp-ins.dark p{color:#bdd2c4}
  .rp-ins b{margin-left:auto;color:var(--forest);font-family:var(--fd);font-weight:800;font-size:23px}.rp-ins.dark b{color:var(--lime)}
  @media(max-width:1000px){.rp-in{grid-template-columns:1fr}.rp-modules{grid-template-columns:repeat(2,1fr)}.rp-strip{grid-template-columns:repeat(4,1fr);gap:12px}.rp-strip span:after{display:none}.rp-insight{grid-template-columns:1fr}}
  @media(max-width:640px){.rp-hero{margin:-22px -18px 20px;padding:30px 18px 22px}.rp-modules{grid-template-columns:1fr}.rp-flowmini{grid-template-columns:repeat(2,1fr)}.rp-strip{grid-template-columns:repeat(4,1fr)}}
  /* form */
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--n500);margin:13px 0 5px}
  input,select,textarea{width:100%;box-sizing:border-box;border:1px solid var(--n200);border-radius:9px;padding:10px 11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--emerald);box-shadow:0 0 0 3px rgba(0,143,55,.12)}
  input[readonly]{background:var(--mist);font-weight:700;color:var(--forest)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--n500);margin-top:6px}
  .btn{border:0;border-radius:10px;background:var(--emerald);color:#fff;font-weight:700;padding:11px 16px;cursor:pointer;font-size:14px;font-family:inherit;display:inline-flex;align-items:center;gap:7px;transition:filter .15s}
  .btn:hover{filter:brightness(1.05)}.btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:#fff;color:var(--forest);border:1px solid var(--n200)}
  .btn.warn{background:var(--orange)}.btn.danger{background:var(--danger)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  /* stepper */
  .stepper{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 18px}
  .stepper .st{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--n500);background:var(--n100);border:1px solid var(--n200);border-radius:999px;padding:6px 12px}
  .stepper .st i{width:18px;height:18px;border-radius:50%;background:var(--n300);color:#fff;font-style:normal;display:inline-grid;place-items:center;font-size:11px;font-family:var(--fm)}
  .stepper .st.done{color:var(--pine);background:var(--pale);border-color:var(--sprout)}.stepper .st.done i{background:var(--emerald)}
  .stepper .st.cur{color:var(--forest);background:#fff;border-color:var(--emerald);box-shadow:0 0 0 2px rgba(0,143,55,.15)}.stepper .st.cur i{background:var(--forest)}
  /* table — aérées */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--n500);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--n200);background:var(--n100)}
  td{padding:15px 16px;border-bottom:1px solid var(--n100);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:var(--mist)}
  td.mono,th.mono{font-family:var(--fm)}
  .tablewrap{overflow-x:auto;border:1px solid var(--n200);border-radius:16px}
  /* barre de progression (part BIN / contribution) */
  .bar{display:flex;align-items:center;gap:10px;min-width:150px}
  .bar .track{flex:1;height:8px;border-radius:999px;background:var(--pale);overflow:hidden;min-width:70px}
  .bar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--emerald),var(--lime))}
  .bar b{font-family:var(--fm);font-size:12.5px;color:var(--forest);min-width:44px;text-align:right}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;letter-spacing:.02em;white-space:nowrap}
  .b-ok{background:var(--pale);color:var(--pine);border:1px solid var(--sprout)}
  .b-warn{background:var(--orange-tint);color:#9A6600;border:1px solid var(--orange-soft)}
  .b-danger{background:var(--danger-tint);color:var(--danger);border:1px solid #F1B0A8}
  .b-neutral{background:var(--n100);color:var(--n700);border:1px solid var(--n200)}
  .b-info{background:#E7F1FB;color:#1F6FB2;border:1px solid #BBD9F0}
  /* metric row */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
  .metric{background:var(--mist);border:1px solid var(--n200);border-radius:12px;padding:12px 14px}
  .metric small{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--n500)}
  .metric b{font-family:var(--fm);font-size:22px;color:var(--forest);display:block;margin-top:3px}
  .metric span{font-size:11px;color:var(--n500)}
  .metric.big b{font-size:26px}
  /* rule box */
  .rule{background:var(--pale);border:1px solid var(--sprout);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--forest);margin-top:14px}
  .rule b{font-family:var(--fd)}
  .alert{background:var(--danger-tint);border:1px solid #F1B0A8;color:var(--danger);border-radius:12px;padding:12px 14px;font-size:13px;margin:12px 0}
  .okbox{background:var(--pale);border:1px solid var(--sprout);color:var(--pine);border-radius:12px;padding:12px 14px;font-size:13px;margin:12px 0}
  .balance{font-family:var(--fm);font-size:20px;color:var(--forest);text-align:center;padding:14px;background:var(--mist);border-radius:12px;border:1px dashed var(--sprout);margin:8px 0}
  .balance small{display:block;font-family:var(--fb);font-size:11px;color:var(--n500);margin-top:6px}
  .empty{text-align:center;color:var(--n500);padding:40px 20px;font-size:14px}
  .pill-formula{font-family:var(--fm);font-size:12px;background:var(--forest);color:#eafff2;border-radius:8px;padding:8px 11px;display:inline-block}
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--n100)}
  .timeline li .tl-t{font-family:var(--fm);font-size:12px;color:var(--n500);width:52px;flex:0 0 auto}
  .timeline li .tl-b b{font-size:13px;color:var(--ink);font-weight:600}
  .timeline li .tl-b span{font-size:12px;color:var(--n500);display:block}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.err{background:var(--danger)}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;width:246px;z-index:100;transform:translateX(-100%);transition:transform .2s}
    .side.open{transform:none}
    .kpis{grid-template-columns:1fr 1fr}
    .menu-toggle{display:inline-flex!important}
  }
  .menu-toggle{display:none;border:1px solid var(--n200);background:#fff;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:16px}
  /* Portail plein écran : la barre latérale (liste des modules) est masquée
     et le contenu occupe toute la largeur (pas de plafond 1180px → plus de
     vide à droite). */
  .app.portal{grid-template-columns:1fr}
  .app.portal .side{display:none}
  .app.portal .menu-toggle{display:none!important}
  .app.portal .content{max-width:none}
</style>
</head>

  <aside class="side" id="side">
    <div class="brand">
      <span class="chip"><img src="../assets/logo-pjs-mark.png" alt="PJS"></span>
      <span><b>RCN TRACE</b><small data-i18n="brand.sub">Traçabilité matière</small></span>
    </div>
    <nav id="nav"></nav>

      <a href="../index.html">← <span data-i18n="nav.portal">Portail ANAGROCI</span></a>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <div class="crumb" id="crumb">Accueil<small>Tableau de bord</small></div>
      </div>
      <div class="r">
        <button class="langbtn" id="langbtn" onclick="RCNUI.toggleLang()">EN</button>
        <span class="net on" id="net"><span class="d"></span><span id="netlbl">En ligne</span></span>
