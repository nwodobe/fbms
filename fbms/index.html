  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'

  html += '<div style="background:'+T.forestDark+';border-radius:8px;padding:10px 14px;margin-bottom:14px">'
    + '<div class="ff-body" style="font-size:9px;font-weight:700;color:'+T.cashew+';letter-spacing:.08em">'+t('RECOMMANDATION')+'</div>'
    + '<div class="ff-body" style="font-size:11px;color:#fff">'+swot.recommandation+'</div></div>';
  // RT
  if (rtList.length){
    html += '<div style="margin-bottom:14px"><div class="ff-body" style="font-size:11px;font-weight:700;color:'+T.forest700+';margin-bottom:4px">'+t('Candidats RT')+' ('+rtList.length+'/3)</div>'
      + '<table style="width:100%;border-collapse:collapse">'
      + '<tr>'+['Nom','Téléphone','Activité','Réputation'].map(h=>'<th class="ff-body" style="font-size:9px;color:#4B5A52;text-align:left;padding:3px 6px;border-bottom:1px solid '+T.line+'">'+t(h)+'</th>').join('')+'</tr>'

      + '</table></div>';

  // Photos
  const slotsAvecPhoto = PHOTO_SLOTS.filter(([k])=>hasPhotoSrc(v.photos[k]));
  if (slotsAvecPhoto.length){
    html += '<div style="margin-bottom:14px"><div class="ff-body" style="font-size:11px;font-weight:700;color:'+T.forest700+';margin-bottom:4px">'+t('Photos')+' ('+slotsAvecPhoto.length+'/6)</div>'
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
      + slotsAvecPhoto.map(([k,label])=>'<div><img src="'+v.photos[k]+'" style="width:100%;height:110px;object-fit:cover;border-radius:6px;border:1px solid '+T.line+'"/><div class="ff-body" style="font-size:9px;color:#4B5A52;text-align:center;margin-top:2px">'+t(label)+'</div></div>').join('')
      + '</div></div>';
  }
  // Décision + signature
  html += '<div style="display:flex;gap:16px;border-top:2px solid '+T.forestDark+';padding-top:10px">'
    + '<div style="flex:1">'+meta('Décision', v.s9.decision)+'</div>'
    + '<div style="width:220px"><div class="ff-mono" style="font-size:9px;color:#4B5A52;text-transform:uppercase">'+t('Signature Branch Manager')+'</div>'
    + '<div style="height:52px;border-bottom:1px solid '+T.ink+'"></div></div></div>';
  html += '<div class="ff-mono" style="font-size:8px;color:#4B5A52;margin-top:10px;text-align:right">'+t('Généré le')+' '+new Date().toLocaleString(LANG==="fr"?"fr-FR":"en-GB")+' · FBMS '+APP_CONFIG.app.version+'</div>';
  html += '</div></div>';

  const root = document.getElementById("report-root");
  root.innerHTML = html;
  root.style.display = "block";
  document.body.classList.add("fbms-print");
  if (window.lucide) lucide.createIcons();
  window.scrollTo(0,0);
}
function closeVillageReport(){

  root.style.display = "none";
  root.innerHTML = "";
  document.body.classList.remove("fbms-print");
}

/* ============================================================================
   INIT
   ========================================================================== */
async function init(){
  // Étape 1 : restauration de la session conservée AVANT le premier rendu,
  // pour que la topbar affiche immédiatement l'utilisateur connecté.
  AUTH.restore();
  if (AUTH.isConnected() && AUTH.session.role) STATE.role = AUTH.session.role;

  // Étape 0 : ouverture de la base locale IndexedDB avant tout rendu.
  // En cas d'échec (navigation privée stricte…), bascule mémoire volatile
  // pour que l'application reste utilisable.
  try{
    if (typeof ADAPTER.init === "function") await ADAPTER.init();
  } catch(e){
    console.error("[FBMS] Échec d'ouverture IndexedDB — bascule en mémoire volatile.", e);
    ADAPTER = new InMemoryAdapter([]); // bascule effective : l'app reste utilisable, données non persistées
    RT_ADAPTER = new InMemoryAdapter([]); // v0.10 : même bascule pour la base RT
    PROD_ADAPTER = new InMemoryAdapter([]); // v0.11 : même bascule pour les producteurs
  }
  await migrerRegions(); // v0.14.1 : réaffectation Gbêkê / Bélier par département (une fois par appareil)
  await migrerRepushSupabase(); // v0.16.1 : renvoyer vers Supabase les fiches "synced" héritées de l'ancien backend
  STATE.villages = await ADAPTER.list();
  try{ STATE.rt = await RT_ADAPTER.list(); } catch(e){ STATE.rt = []; } // v0.10
  try{ STATE.producteurs = await PROD_ADAPTER.list(); } catch(e){ STATE.producteurs = []; } // v0.11
  buildSidebar();
  buildTopbar();
  renderContent();

  // Étape 1 : revalidation de la session en arrière-plan (non bloquante).
  // v0.15.2 : en mode Supabase, on revalide MÊME sans session applicative
  // locale — validate() reconstruit la session depuis la session Supabase
  // (connexion faite via logistique.html, appareil d'avant-bascule, etc.),
  // et le bouton Synchroniser réapparaît de lui-même.
  if (AUTH.isConfigured() && (AUTH.isConnected() || isSupabase())){
    AUTH.validate().then(valid=>{
      buildTopbar();
      if (!valid && STATE.active==="admin") renderContent();
      // Étape 2 : synchronisation silencieuse au démarrage quand la session est valide.
      if (valid) syncNow(true);
    });
  }

  // Étape 4 : reprise automatique au retour du réseau + signal hors ligne.
  window.addEventListener("online", ()=>{
    setSyncStatus("Connexion rétablie — synchronisation…", T.inkSoft);
    if (AUTH.isConnected()) syncNow(true);
  });
  window.addEventListener("offline", ()=>{
    setSyncStatus("Hors ligne — enregistrement local uniquement", T.orange);
  });
  // Étape 4 : synchronisation automatique périodique (débrayable dans Administration).
  startAutoSync();

  // PWA : enregistrement du service worker — uniquement en HTTPS (hébergé).
  // Sans effet quand le fichier est ouvert localement.
  if ("serviceWorker" in navigator && location.protocol === "https:"){
    navigator.serviceWorker.register("./sw.js")
      .catch(e=>console.warn("[FBMS] Service worker non enregistré :", e.message));
  }
}
init();
