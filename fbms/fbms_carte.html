<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FBMS Carte</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>html,body{margin:0;height:100%;font-family:Arial}body{display:flex;flex-direction:column}.top{height:56px;background:#053B23;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 14px}.btn{background:white;color:#053B23;padding:8px 10px;border-radius:8px;text-decoration:none;font-weight:bold;border:0;cursor:pointer}.body{flex:1;display:flex}.side{width:285px;background:#fff;border-right:1px solid #ddd;padding:12px;overflow:auto}.map{flex:1}.k{background:#f1f9ef;border:1px solid #ddd;border-radius:8px;padding:9px;margin-bottom:8px}.vlabel{background:white;border:1px solid #bbb;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:bold;box-shadow:0 2px 5px #0002;white-space:nowrap}.clabel{background:#053B23;color:white;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:bold;white-space:nowrap}.leaflet-label-pane{z-index:760!important;pointer-events:none}.msg{font-size:12px;color:#4b5a52;line-height:1.4}select,input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:7px;padding:7px;margin:5px 0 8px}@media(max-width:800px){.body{display:block}.side{width:100%;height:205px}.map{height:calc(100vh - 261px)}}</style></head><body><div class="top"><div><b>Cartographie FBMS</b><br><small>Villages et clusters depuis Supabase</small></div><a class="btn" href="https://nwodobe.github.io/fbms/">Portail</a></div><div class="body"><aside class="side"><div class="k"><b>Villages affichés:</b> <span id="kv">0</span></div><div class="k"><b>Clusters:</b> <span id="kc">0</span></div><select id="fcluster" onchange="draw()"><option value="">Tous les clusters</option></select><input id="search" oninput="draw()" placeholder="Rechercher un village"><button class="btn" onclick="toggleLabels()">Afficher / masquer noms</button><p class="msg" id="msg">Chargement Supabase...</p></aside><div id="map" class="map"></div></div><script>const SB=supabase.createClient('https://jmbdgpdthzpszfnddwzi.supabase.co','sb_publishable_Gu5j0VV4ymP-I9t3JriQXg_VlTJqV2d');var map=L.map('map').setView([7.52,-5.08],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'OpenStreetMap'}).addTo(map);map.createPane('labels');map.getPane('labels').className+=' leaflet-label-pane';var layerLabels=L.layerGroup().addTo(map),layerPoints=L.layerGroup().addTo(map),layerLines=L.layerGroup().addTo(map);var show=true,villages=[],hubs=[],hubByKey={},usine={lat:6.741972,lng:-5.345750};function $(i){return document.getElementById(i)}function num(x){var n=parseFloat(String(x??'').replace(',','.'));return isFinite(n)?n:null}function key(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'')}function esc(s){return String(s??'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}function label(t,lat,lng,c){if(!show)return;var ic=L.divIcon({className:'',html:'<div class="'+c+'">'+esc(t)+'</div>',iconSize:null,iconAnchor:[-8,-8]});L.marker([lat,lng],{icon:ic,pane:'labels',interactive:false,zIndexOffset:10000}).addTo(layerLabels)}function keep(){map.getPane('labels').style.zIndex=760;layerLabels.eachLayer(function(x){if(x.setZIndexOffset)x.setZIndexOffset(10000)})}function vpos(v){var la=num(v.s1&&v.s1.gpsLat),ln=num(v.s1&&v.s1.gpsLng);return la!=null&&ln!=null?{lat:la,lng:ln}:null}function hpos(h){var la=num(h&&h.gps_lat),ln=num(h&&h.gps_lng);return la!=null&&ln!=null?{lat:la,lng:ln}:null}function vcluster(v){var raw=((v.s1&&v.s1.cluster)||'').trim();var h=hubByKey[key(raw)];return h?h.nom:raw.toUpperCase()}function clusterPos(nom){var h=hubs.find(x=>key(x.nom)===key(nom));var p=hpos(h);if(p)return p;var pts=villages.filter(v=>key(vcluster(v))===key(nom)).map(vpos).filter(Boolean);if(!pts.length)return null;return{lat:pts.reduce((s,p)=>s+p.lat,0)/pts.length,lng:pts.reduce((s,p)=>s+p.lng,0)/pts.length}}async function load(){try{var r=await SB.from('parametres_calcul').select('cle,valeur');(r.data||[]).forEach(x=>{if(x.cle==='usine_lat')usine.lat=Number(x.valeur);if(x.cle==='usine_lng')usine.lng=Number(x.valeur)});r=await SB.from('villages').select('data,statut').eq('deleted',false);villages=(r.data||[]).map(x=>Object.assign({},x.data,{_statut:x.statut})).filter(v=>v.s1);r=await SB.from('hubs_clusters').select('*').eq('deleted',false);hubs=r.data||[];hubByKey={};hubs.forEach(h=>hubByKey[h.hub_key||key(h.nom)]=h);fillFilters();$('msg').innerHTML='Données chargées depuis Supabase. Toute nouvelle fiche village/cluster avec GPS apparaîtra après rechargement.';draw()}catch(e){$('msg').innerHTML='Erreur Supabase: '+e.message}}function fillFilters(){var cs=[...new Set(villages.map(vcluster).filter(Boolean))].sort();$('fcluster').innerHTML='<option value="">Tous les clusters</option>'+cs.map(c=>'<option>'+esc(c)+'</option>').join('')}function filtered(){var fc=$('fcluster').value,q=$('search').value.toLowerCase();return villages.filter(v=>(!fc||vcluster(v)===fc)&&(!q||((v.s1&&v.s1.village)||'').toLowerCase().includes(q)))}function draw(){layerLabels.clearLayers();layerPoints.clearLayers();layerLines.clearLayers();var vs=filtered(),cs=[...new Set(vs.map(vcluster).filter(Boolean))],bounds=[];$('kv').textContent=vs.length;$('kc').textContent=cs.length;L.marker([usine.lat,usine.lng]).addTo(layerPoints).bindPopup('Usine Yamoussoukro');cs.forEach(c=>{var p=clusterPos(c);if(!p)return;L.circleMarker([p.lat,p.lng],{radius:14,color:'#fff',weight:3,fillColor:'#053B23',fillOpacity:.95}).addTo(layerPoints).bindPopup('<b>'+esc(c)+'</b>');label(c,p.lat,p.lng,'clabel');bounds.push([p.lat,p.lng]);L.polyline([[p.lat,p.lng],[usine.lat,usine.lng]],{color:'#EE9E00',weight:3,dashArray:'8 7'}).addTo(layerLines)});vs.forEach(v=>{var p=vpos(v),c=vcluster(v),hp=clusterPos(c),nom=(v.s1&&v.s1.village)||'Village';if(!p)return;L.circleMarker([p.lat,p.lng],{radius:7,color:'#fff',weight:2,fillColor:'#1F5B3F',fillOpacity:.95}).addTo(layerPoints).bindPopup('<b>'+esc(nom)+'</b><br>Cluster: '+esc(c));label(nom,p.lat,p.lng,'vlabel');bounds.push([p.lat,p.lng]);if(hp)L.polyline([[p.lat,p.lng],[hp.lat,hp.lng]],{color:'#1d6fa5',weight:2,dashArray:'7 6'}).addTo(layerLines)});keep();if(bounds.length)map.fitBounds(bounds,{padding:[35,35],maxZoom:12})}function toggleLabels(){show=!show;draw()}['click','zoomend','moveend','popupopen','popupclose'].forEach(e=>map.on(e,()=>setTimeout(keep,20)));load();</script></body></html>
