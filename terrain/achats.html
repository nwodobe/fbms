<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Achats Terrain</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script defer src="../shared/auth-gate.js" data-module="fbms"></script><style>body{margin:0;font-family:Arial;background:#f7f5ef;color:#132a22}.top{background:#053B23;color:white;padding:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.btn{background:#1F5B3F;color:white;border:0;border-radius:8px;padding:9px 12px;text-decoration:none;font-weight:bold;cursor:pointer}.ghost{background:white;color:#053B23}.wrap{max-width:1150px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:380px 1fr;gap:14px}.card{background:white;border:1px solid #ddd;border-radius:12px;padding:14px}label{display:block;font-size:11px;font-weight:bold;color:#5b6b62;margin-top:10px}input,select,textarea{width:100%;box-sizing:border-box;padding:9px;border:1px solid #ddd;border-radius:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.k{background:#f1f9ef;border:1px solid #ddd;border-radius:10px;padding:9px}.k b{font-size:20px;color:#053B23}.msg{padding:9px;border-radius:8px;margin-top:10px}.ok{background:#e0f3de}.warn{background:#fff4df}.bad{background:#fdeceb}table{width:100%;border-collapse:collapse;min-width:760px}th{background:#053B23;color:white;text-align:left;padding:8px;font-size:11px}td{border-top:1px solid #eee;padding:8px;font-size:12px}.table{overflow:auto}@media(max-width:850px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr}}</style></head><body><header class="top"><div><b>Achats Terrain</b><br><small>Capture Producteur → RT → Village</small></div><div><a class="btn ghost" href="../index.html">Portail</a> <a class="btn ghost" href="../fbms/app.html">FBMS</a> <span id="anagroci-userslot"></span></div></header><main class="wrap"><div id="net" class="msg warn">Initialisation...</div><section class="kpis"><div class="k"><small>Volume jour</small><br><b id="kVol">0 kg</b></div><div class="k"><small>Montant</small><br><b id="kAmt">0 F</b></div><div class="k"><small>Commission</small><br><b id="kCom">0 F</b></div><div class="k"><small>En attente</small><br><b id="kPend">0</b></div></section><div class="grid"><section class="card"><h2>Nouvel achat</h2><label>Date</label><input id="date" type="date"><label>Village</label><select id="village" onchange="pickVillage()"></select><div class="row"><div><label>Cluster</label><input id="cluster" readonly></div><div><label>RT</label><input id="rt"></div></div><label>Producteur</label><input id="prod"><div class="row"><div><label>Poids brut kg</label><input id="brut" type="number" oninput="compute()"></div><div><label>Tare kg</label><input id="tare" type="number" value="0" oninput="compute()"></div></div><div class="row"><div><label>Poids net kg</label><input id="netkg" readonly></div><div><label>Prix/kg</label><input id="prix" type="number" value="400" oninput="compute()"></div></div><div class="row"><div><label>Montant</label><input id="montant" readonly></div><div><label>Nb sacs</label><input id="sacs" type="number"></div></div><div class="row"><div><label>Mode paiement</label><select id="mode"><option>Cash</option><option>Wave</option><option>Orange Money</option></select></div><div><label>N° reçu</label><input id="recu"></div></div><div class="row"><div><label>Humidité %</label><input id="hum" type="number"></div><div><label>Impuretés %</label><input id="imp" type="number"></div></div><label>Observation</label><textarea id="obs"></textarea><p><button class="btn" onclick="saveAchat()">Enregistrer</button> <button class="btn ghost" onclick="syncAll()">Synchroniser</button></p><div id="msg"></div></section><section class="card table"><h2>File locale</h2><table><thead><tr><th>Statut</th><th>Date</th><th>Village</th><th>RT</th><th>Net</th><th>Montant</th><th>Reçu</th></tr></thead><tbody id="rows"></tbody></table></section></div></main><script>const SB=supabase.createClient('https://jmbdgpdthzpszfnddwzi.supabase.co','sb_publishable_Gu5j0VV4ymP-I9t3JriQXg_VlTJqV2d');const $=i=>document.getElementById(i),STORE='fb_achats_queue_v1';let V=[],SESSION=null;function n(x){let v=parseFloat(String(x||'').replace(',','.'));return isFinite(v)?v:0}function kg(x){return Math.round(n(x)*10)/10+' kg'}function F(x){return Math.round(n(x)).toLocaleString('fr-FR')+' F'}function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function q(){try{return JSON.parse(localStorage.getItem(STORE)||'[]')}catch(e){return[]}}function setQ(a){localStorage.setItem(STORE,JSON.stringify(a));render()}function uid(){return 'ACH-'+Date.now()+'-'+Math.random().toString(36).slice(2,8)}async function init(){date.value=new Date().toISOString().slice(0,10);netState();window.addEventListener('online',()=>{netState();syncAll()});window.addEventListener('offline',netState);let r=await SB.auth.getSession();SESSION=r.data.session;await loadRef();render();if(navigator.onLine)syncAll()}function netState(){net.className='msg '+(navigator.onLine?'ok':'warn');net.textContent=navigator.onLine?'En ligne':'Hors-ligne: saisie locale active'}async function loadRef(){try{let r=await SB.from('villages').select('id,data').eq('deleted',false);V=(r.data||[]).filter(x=>x.data&&x.data.s1);localStorage.setItem('fb_achats_ref',JSON.stringify(V))}catch(e){V=JSON.parse(localStorage.getItem('fb_achats_ref')||'[]')}village.innerHTML='<option value="">Choisir</option>'+V.map(v=>'<option value="'+v.id+'">'+esc(v.data.s1.village)+'</option>').join('')}function pickVillage(){let v=V.find(x=>x.id===village.value);cluster.value=v?(v.data.s1.cluster||''):'';rt.value=v?(v.data.s2?.rtNom||v.data.s2?.rt||''):rt.value}function compute(){let net=Math.max(0,n(brut.value)-n(tare.value));netkg.value=net?net:'';montant.value=net?Math.round(net*n(prix.value)):''}async function saveAchat(){compute();let v=V.find(x=>x.id===village.value),net=n(netkg.value),px=n(prix.value);if(!v||!net||!px)return show('Village, poids et prix obligatoires','bad');let a={local_id:uid(),date:date.value,cluster:cluster.value,village_id:v.id,village_nom:v.data.s1.village||'',rt_nom:rt.value,producteur_nom:prod.value,poids_brut:n(brut.value),tare:n(tare.value),poids_net:net,prix_kg:px,montant:net*px,mode_paiement:mode.value,numero_recu:recu.value,nb_sacs:n(sacs.value),humidite:n(hum.value)||null,impuretes:n(imp.value)||null,rejet:false,observation:obs.value,commission_rt:net*10,bonus_diff:net*5,refinancable:!!recu.value,created_by:SESSION?.user?.id||null,created_by_nom:SESSION?.user?.email||'',sync_statut:'LOCAL',_status:'WAIT'};let arr=q();arr.unshift(a);setQ(arr);show(a.refinancable?'Achat enregistré':'Achat enregistré, reçu manquant donc non refinançable','warn');if(navigator.onLine)syncAll()}async function syncAll(){if(!navigator.onLine)return;let arr=q();for(let a of arr){if(a._status==='SYNC')continue;let p=Object.assign({},a);delete p._status;let r=await SB.from('achats').upsert(p,{onConflict:'local_id'});if(!r.error){a._status='SYNC';a.sync_statut='Synchronise'}else a._error=r.error.message}setQ(arr)}function render(){let arr=q(),d=new Date().toISOString().slice(0,10),day=arr.filter(a=>a.date===d),vol=day.reduce((s,a)=>s+n(a.poids_net),0),amt=day.reduce((s,a)=>s+n(a.montant),0),com=day.reduce((s,a)=>s+n(a.commission_rt),0);kVol.textContent=kg(vol);kAmt.textContent=F(amt);kCom.textContent=F(com);kPend.textContent=arr.filter(a=>a._status!=='SYNC').length;rows.innerHTML=arr.map(a=>'<tr><td>'+esc(a._status==='SYNC'?'SYNCHRO':a._error?'ERREUR':'LOCAL')+'</td><td>'+esc(a.date)+'</td><td>'+esc(a.village_nom)+'</td><td>'+esc(a.rt_nom)+'</td><td>'+kg(a.poids_net)+'</td><td>'+F(a.montant)+'</td><td>'+esc(a.numero_recu||'--')+'</td></tr>').join('')||'<tr><td colspan="7">Aucun achat</td></tr>'}function show(t,c){msg.className='msg '+c;msg.textContent=t}init();</script></body></html>
